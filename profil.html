<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon profil &#8212; BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:68px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;gap:1rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nav-nm{font-size:.8rem;font-weight:600;color:#333}
.nav-pl{background:#FFF8E1;color:#E5AC00;font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem Poppins,sans-serif;cursor:pointer;color:#666;text-decoration:none;display:inline-flex;align-items:center}
.btn-sm:hover{border-color:#111;color:#111}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(4,1fr);height:58px;z-index:100}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:Poppins,sans-serif;cursor:pointer;transition:color .15s}
.bn.on,.bn:hover{color:#FFC107}.bni{font-size:1.1rem;line-height:1}
.pg{margin-top:60px;padding:1.5rem 1.25rem;max-width:860px;margin-left:auto;margin-right:auto}
.by{display:inline-flex;align-items:center;justify-content:center;padding:.78rem 1.4rem;background:#FFC107;color:#111;font:700 .86rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.by:hover{background:#E5AC00}.by:disabled{background:#ccc;color:#888;cursor:not-allowed}
.bg{display:inline-flex;align-items:center;padding:.65rem 1.1rem;background:none;color:#666;font:600 .8rem Poppins,sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;text-decoration:none}
.bg:hover{border-color:#111;color:#111}
.card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid #E2E2E2;margin-bottom:1rem}
.sec-h{font-size:.9rem;font-weight:800;margin-bottom:.9rem}
.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
label{display:block;font-size:.72rem;font-weight:700;color:#444;margin-bottom:.3rem;margin-top:.75rem}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:.68rem .9rem;border:1.5px solid #E2E2E2;border-radius:9px;font:500 .85rem Poppins,sans-serif;outline:none;background:#F8F8F8;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus{border-color:#FFC107;background:#fff}
input:disabled{opacity:.5;cursor:not-allowed}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.plan-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.85rem}
.plan-inf h4{font-size:.88rem;font-weight:700;margin-bottom:.15rem}
.plan-inf p{font-size:.78rem;color:#666}
.plan-bdg{background:#FFF8E1;color:#E5AC00;font-size:.68rem;font-weight:800;padding:.2rem .55rem;border-radius:4px;white-space:nowrap;margin-top:.2rem}
.danger{margin-top:.85rem;padding-top:.85rem;border-top:1px solid #F0F0F0}
.btn-d{padding:.5rem 1rem;background:none;border:1.5px solid #EF4444;border-radius:8px;font:600 .76rem Poppins,sans-serif;color:#EF4444;cursor:pointer}
.btn-d:hover{background:#EF4444;color:#fff}
@media(max-width:480px){.r2{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<nav class="nav"><a href="/" style="text-decoration:none;display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;background:#111;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#FFC107;font-weight:900;font-size:11px;font-family:Poppins,sans-serif;letter-spacing:-0.5px">BM</span></div><span style="font:900 15px/1 Poppins,sans-serif;color:#111;letter-spacing:0.5px">BOOST<span style="color:#FFC107">.ME</span></span></a><div class="nav-r"><span class="nav-nm" id="nav-nm"></span><span class="nav-pl" id="nav-pl">Starter</span><button class="btn-sm" onclick="doLogout()">Quitter</button></div></nav><nav class="bnav"><a class="bn" href="/dashboard"><span class="bni">🏠</span>Accueil</a><a class="bn" href="/challenges"><span class="bni">🎯</span>Challenges</a><a class="bn" href="/challenge-day"><span class="bni">⚡</span>En cours</a><a class="bn" href="/mon-espace"><span class="bni">👤</span>Moi</a></nav>
<div class="pg"><div style="font-size:1.2rem;font-weight:900;margin-bottom:1.25rem">Mon profil &#128100;</div><div class="card"><div class="sec-h">Informations personnelles</div><div class="r2"><div><label>Prénom</label><input id="f-pn" type="text"></div><div><label>Nom</label><input id="f-nm" type="text"></div></div><label>Email</label><input id="f-em" type="email" disabled><label>Pays</label><select id="f-py"><option value="">Sélectionner&#8230;</option><option value="FR">France</option><option value="BE">Belgique</option><option value="CH">Suisse</option><option value="CA">Canada</option><option value="GB">Royaume-Uni</option><option value="US">États-Unis</option><option value="CM">Cameroun</option><option value="GA">Gabon</option><option value="CG">Congo</option><option value="CI">Côte d'Ivoire</option><option value="SN">Sénégal</option><option value="other">Autre</option></select><button class="by" onclick="save()" style="margin-top:1rem">Enregistrer les modifications</button></div><div class="card"><div class="sec-h">Mon abonnement</div><div class="plan-row"><div class="plan-inf"><h4 id="plan-nm">&#8212;</h4><p id="plan-dt">&#8212;</p></div><span class="plan-bdg" id="plan-bdg">&#8212;</span></div><a class="by" href="/tarifs" style="font-size:.84rem">Voir les plans &#8594;</a></div><div class="card"><div class="sec-h">Sécurité</div><button class="bg" onclick="resetPwd()">Changer mon mot de passe</button><div class="danger"><button class="btn-d" onclick="delAcc()">Supprimer mon compte</button></div></div></div>
<div class="toast" id="toast"></div>
<script>var _sb=window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');
var _u=null,_p=null,_tt;
function toast(m){var e=document.getElementById('toast');if(!e)return;e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show')},3000);}
function doLogout(){_sb.auth.signOut().then(function(){window.location.href='/';});}
async function initUser(){
  var r=await _sb.auth.getSession();
  if(!r.data.session){window.location.href='/login';return null;}
  _u=r.data.session.user;
  var pr=await _sb.from('profiles').select('*').eq('id',_u.id).single();
  _p=pr.data||{};
  var n=document.getElementById('nav-nm');if(n)n.textContent=_p.prenom||'';
  var pl=document.getElementById('nav-pl');
  if(pl){var lb={free:'Starter',unit:'Challenge',annual:'Annuel',pending:'En attente'};
  pl.textContent=lb[(_p&&_p.plan)||'free']||'Starter';}
  return _u;
}

async function run(){
  var u=await initUser();if(!u)return;
  document.getElementById('f-pn').value=_p.prenom||'';
  document.getElementById('f-nm').value=_p.nom||'';
  document.getElementById('f-em').value=u.email||'';
  document.getElementById('f-py').value=_p.pays||'';
  var pn={free:'Starter (Gratuit)',unit:'Challenge unitaire',annual:'Acc\u00e8s Annuel Illimit\u00e9',pending:'En attente de paiement'};
  var pd={free:'Acc\u00e8s au BoostMe Starter',unit:'1 challenge actif',annual:'13 challenges illimit\u00e9s pendant 1 an',pending:'Paiement en cours de traitement'};
  var plan=(_p&&_p.plan)||'free';
  document.getElementById('plan-nm').textContent=pn[plan]||'Starter';
  document.getElementById('plan-dt').textContent=pd[plan]||'';
  document.getElementById('plan-bdg').textContent=plan==='annual'?'\u2713 Actif':plan==='free'?'Gratuit':plan==='pending'?'En attente':'Actif';
}
async function save(){
  var pn=document.getElementById('f-pn').value.trim();
  if(!pn){toast('Entre ton pr\u00e9nom');return;}
  var r=await _sb.from('profiles').update({prenom:pn,nom:document.getElementById('f-nm').value.trim(),pays:document.getElementById('f-py').value}).eq('id',_u.id);
  if(r.error){toast('Erreur : '+r.error.message);return;}
  var n=document.getElementById('nav-nm');if(n)n.textContent=pn;
  toast('\u2705 Profil mis \u00e0 jour !');
}
async function resetPwd(){
  var r=await _sb.auth.resetPasswordForEmail(_u.email,{redirectTo:'https://boostme.social/reset-password'});
  if(r.error){toast('Erreur : '+r.error.message);return;}
  toast('\u2709\ufe0f Email envoy\u00e9 ! V\u00e9rifie ta bo\u00eete mail.');
}
async function delAcc(){
  if(!confirm('Supprimer d\u00e9finitivement ton compte ? Cette action est irr\u00e9versible.'))return;
  await _sb.from('profiles').delete().eq('id',_u.id);
  await _sb.auth.signOut();
  window.location.href='/';
}
run();
</script>
</body>
</html>
