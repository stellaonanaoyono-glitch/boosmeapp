<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Paiement confirmé &#8212; BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Poppins",sans-serif;background:#F2F2F2;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:#fff;border-radius:20px;padding:2.5rem 2rem;max-width:460px;width:100%;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.08)}
.ico{font-size:3.5rem;display:block;margin-bottom:1rem}
h1{font-size:1.35rem;font-weight:900;margin-bottom:.5rem}
.sub{font-size:.84rem;color:#666;line-height:1.65;margin-bottom:1.5rem}
.ch-activated{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:14px;padding:1.1rem;margin-bottom:1.5rem;display:none}
.ch-activated .lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,193,7,.65);margin-bottom:.35rem}
.ch-activated .nm{font-size:1rem;font-weight:800;color:#fff}
.ch-activated .ds{font-size:.74rem;color:rgba(255,255,255,.45);margin-top:.2rem}
.annual-box{background:#FFF8E1;border:1px solid rgba(255,193,7,.3);border-radius:14px;padding:1rem;margin-bottom:1.5rem;display:none}
.annual-box p{font-size:.82rem;color:#666;line-height:1.6}
.annual-box strong{color:#111}
.by{display:inline-flex;align-items:center;justify-content:center;padding:.85rem 1.75rem;background:#FFC107;color:#111;font:700 .9rem "Poppins",sans-serif;border:none;border-radius:10px;cursor:pointer;text-decoration:none;width:100%;transition:all .2s;margin-bottom:.55rem}
.by:hover{background:#E5AC00}
.bg2{display:inline-flex;align-items:center;justify-content:center;padding:.75rem 1.5rem;background:none;color:#666;font:600 .85rem "Poppins",sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;text-decoration:none;width:100%;transition:all .2s}
.bg2:hover{border-color:#111;color:#111}
.spin-wrap{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:1rem;color:#999;font-size:.84rem}
.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div class="card">
<span class="ico">&#127881;</span>
<h1>Paiement confirmé !</h1>
<p class="sub" id="sub-txt">Ton accès est en cours d'activation…</p>
<div id="spin-zone" class="spin-wrap"><div class="spin"></div>&nbsp;Vérification en cours&#8230;</div>
<div class="ch-activated" id="ch-box">
<div class="lbl">Challenge activé</div>
<div class="nm" id="ch-nm">-</div>
<div class="ds" id="ch-ds">-</div>
</div>
<div class="annual-box" id="annual-box">
<p><strong>Accès annuel activé !</strong><br>13 challenges disponibles dans ton tableau de bord. Commence celui qui t’attire le plus.</p>
</div>
<div id="btns" style="display:none">
<a class="by" href="/dashboard">Aller à mon tableau de bord &rarr;</a>
<a class="bg2" href="/challenges">Voir tous les challenges</a>
</div>
</div>
<script>
var _sb=window.supabase.createClient("https://hddxbjmdtbxvxwmmdxmj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ");
var CH_NAMES={"cash-clarity": "Cash Clarity", "glow-up": "Glow Up", "mental-detox": "Mental Detox", "morning-power": "Morning Power", "unshakeable-confidence": "Unshakeable Confidence", "body-reset": "Body Reset", "build-your-brand": "Build Your Brand", "side-hustle-starter": "Side Hustle Starter", "own-the-room": "Own The Room", "deep-work-mode": "Deep Work Mode", "network-like-a-pro": "Network Like a Pro", "read-and-lead": "Read & Lead"};

async function run(){
  var params=new URLSearchParams(window.location.search);
  var plan=params.get('plan')||'annual';
  var chId=params.get('ch')||'';

  // Wait for webhook to process (poll profile for up to 8 seconds)
  var r=await _sb.auth.getSession();
  if(!r.data.session){
    // Not logged in - just show success
    showSuccess(plan,chId,null);
    return;
  }
  var uid=r.data.session.user.id;

  // Poll for activation
  var attempts=0;
  var interval=setInterval(async function(){
    attempts++;
    var pr=await _sb.from('profiles').select('plan').eq('id',uid).single();
    var activated=pr.data&&(pr.data.plan===plan||(plan==='unit'&&pr.data.plan==='unit')||(plan==='annual'&&pr.data.plan==='annual'));

    if(activated||attempts>=8){
      clearInterval(interval);
      showSuccess(plan,chId,uid);
    }
  },1000);
}

async function showSuccess(plan,chId,uid){
  document.getElementById('spin-zone').style.display='none';

  if(plan==='unit'&&chId){
    var nm=CH_NAMES[chId]||chId;
    document.getElementById('ch-nm').textContent=nm;
    document.getElementById('ch-ds').textContent='Tu peux commencer ce challenge d\u00e8s maintenant.';
    document.getElementById('ch-box').style.display='block';
    document.getElementById('sub-txt').textContent='Ton challenge est activ\u00e9 et pr\u00eat \u00e0 d\u00e9marrer.';
    // Point dashboard link directly to challenge-day
    document.querySelector('.by').href='/challenge-day';
    document.querySelector('.by').textContent='Commencer le challenge →';
    // Activate challenge client-side as fallback
    if(uid){try{
      await _sb.from('user_challenges').update({status:'paused'}).eq('user_id',uid).eq('status','active').neq('challenge_id',chId);
      await _sb.from('user_challenges').upsert({user_id:uid,challenge_id:chId,current_day:1,status:'active',streak:0,last_active:new Date().toISOString()},{onConflict:'user_id,challenge_id'});
      console.log('[success] activated:',chId);
    }catch(e){console.warn(e);}}
  }else if(plan==='annual'){
    document.getElementById('annual-box').style.display='block';
    document.getElementById('sub-txt').textContent='Ton acc\u00e8s annuel illimit\u00e9 est activ\u00e9.';
  }else{
    document.getElementById('sub-txt').textContent='Ton acc\u00e8s est activ\u00e9.';
  }

  document.getElementById('btns').style.display='block';
}

run();
</script>
</body>
</html>
