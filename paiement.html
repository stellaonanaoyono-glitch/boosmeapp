<head>

<title>Paiement &mdash; BOOST.ME</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem 'Poppins',sans-serif;cursor:pointer;color:#666;text-decoration:none}
.box{background:#fff;border-radius:20px;padding:2rem 1.75rem;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.08);margin-top:60px}
h1{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:1.5rem}
/* Order card */
.order-card{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.oc-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,193,7,.7);margin-bottom:.6rem}
.oc-name{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.oc-desc{font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:1rem}
.oc-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-top:1px solid rgba(255,255,255,.08);font-size:.84rem}
.oc-row.total{font-weight:800;font-size:1rem}
.oc-row span:first-child{color:rgba(255,255,255,.6)}
.oc-row span:last-child{color:#fff}
.oc-row.total span:last-child{color:#FFC107;font-size:1.2rem}
/* Promo */
.promo-toggle{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;margin-bottom:.75rem;font-size:.84rem;font-weight:600;color:#555;transition:all .15s}
.promo-toggle:hover{border-color:#FFC107}
.promo-body{display:none;padding:.75rem;background:#FAFAFA;border-radius:10px;margin-bottom:.75rem;border:1.5px solid #F0F0F0}
.promo-body.open{display:block}
.promo-row{display:flex;gap:.5rem}
.promo-row input{flex:1;padding:.65rem .9rem;border:1.5px solid #E2E2E2;border-radius:8px;font:500 .84rem 'Poppins',sans-serif;outline:none}
.promo-row input:focus{border-color:#FFC107}
.promo-row button{padding:.65rem 1rem;background:#111;color:#fff;border:none;border-radius:8px;font:700 .8rem 'Poppins',sans-serif;cursor:pointer}
.promo-fb{font-size:.75rem;margin-top:.4rem;font-weight:600}
.promo-fb.ok{color:#22C55E}.promo-fb.err{color:#EF4444}
/* Payment */
.pay-info{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:#F8F8F8;border:1.5px solid #E2E2E2;border-radius:10px;margin-bottom:1rem;font-size:.82rem;color:#555;font-weight:600}
.pay-info span{font-size:1.4rem;flex-shrink:0}
/* Button */
.pay-btn{width:100%;padding:1rem;background:#FFC107;color:#111;font:800 1rem 'Poppins',sans-serif;border:none;border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(255,193,7,.3)}
.pay-btn:hover{background:#E5AC00;transform:translateY(-1px)}
.pay-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.secure{text-align:center;font-size:.7rem;color:#bbb;font-weight:600;margin-top:.75rem}
.toast{position:fixed;bottom:1.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.spin{width:16px;height:16px;border:2px solid rgba(17,17,17,.3);border-top-color:#111;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:.4rem}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

<div class="box">
  <h1>Finaliser mon paiement</h1>

  <!-- Order summary -->
  <div class="order-card">
    <div class="oc-label">Ta commande</div>
    <div class="oc-name" id="oc-name">Chargement&hellip;</div>
    <div class="oc-desc" id="oc-desc"></div>
    <div class="oc-row"><span>Prix</span><span id="oc-price">&mdash;</span></div>
    <div class="oc-row" id="oc-disc-row" style="display:none"><span id="oc-disc-lbl">R&eacute;duction</span><span id="oc-disc-val" style="color:#22C55E">&mdash;</span></div>
    <div class="oc-row total"><span>Total</span><span id="oc-total">&mdash;</span></div>
  </div>

  <!-- Promo -->
  <div class="promo-toggle" onclick="togglePromo()">
    <span>&#127873; J&apos;ai un code promo ou parrainage</span>
    <span id="promo-arrow">&#8211;</span>
  </div>
  <div class="promo-body" id="promo-body">
    <div class="promo-row">
      <input type="text" id="promo-inp" placeholder="Ex&nbsp;: LAUNCH30" maxlength="20"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
      <button onclick="applyPromo()">Appliquer</button>
    </div>
    <div class="promo-fb" id="promo-fb"></div>
  </div>

  <!-- Payment method -->
  <div class="pay-info">
    <span>&#128179;</span>
    Paiement s&eacute;curis&eacute; &mdash; Visa / Mastercard / Pr&eacute;pay&eacute;e
  </div>

  <button class="pay-btn" id="pay-btn" onclick="doPay()">Payer &mdash;</button>
  <div class="secure">&#128274; Paiement 100% s&eacute;curis&eacute; via Stripe</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Init ──────────────────────────────────────────────────────
var _sb = window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');
var _stripe = window.Stripe('pk_live_51TXUY2DHkPqETJlay8lByczxwkXBzjLs4aUHIWZtcvthNKyiL2f20rh1EDDdhU6nnhTgrIi6e8c4tVw77gNH1mXb00P2nP8klu');
var _u = null, _p = null, _tt;
var _disc = 0, _discLabel = '', _promoOpen = false;

// Read plan and challenge from URL — this is the source of truth
var _urlP = new URLSearchParams(window.location.search);
var _plan = _urlP.get('plan') || 'annual';
var _chId = _urlP.get('ch') || '';

var PRICES = {
  annual: { price: 49,   label: 'Accès Annuel Illimité', desc: '13 challenges · Toute l’année · Sans limite' },
  unit:   { price: 3.99, label: 'Challenge unitaire',            desc: '1 challenge · Accès à vie' }
};

var CH_NAMES = {
  'cash-clarity':'Cash Clarity',
  'glow-up':'Glow Up',
  'mental-detox':'Mental Detox',
  'morning-power':'Morning Power',
  'unshakeable-confidence':'Unshakeable Confidence',
  'body-reset':'Body Reset',
  'build-your-brand':'Build Your Brand',
  'side-hustle-starter':'Side Hustle Starter',
  'own-the-room':'Own The Room',
  'deep-work-mode':'Deep Work Mode',
  'network-like-a-pro':'Network Like a Pro',
  'read-and-lead':'Read & Lead'
};

// ── Render order immediately ───────────────────────────────────
function renderOrder() {
  var pl = PRICES[_plan] || PRICES.annual;
  // For unit plan, use challenge name as label
  if (_plan === 'unit' && _chId) {
    pl.label = CH_NAMES[_chId] || _chId;
    pl.desc  = pl.label + ' · 30 jours · Accès à vie';
  }
  var base = pl.price;
  var total = Math.max(0, base - _disc);
  document.getElementById('oc-name').textContent  = pl.label;
  document.getElementById('oc-desc').textContent  = pl.desc;
  document.getElementById('oc-price').textContent = '€' + base.toFixed(2).replace('.', ',');
  if (_disc > 0) {
    document.getElementById('oc-disc-row').style.display = 'flex';
    document.getElementById('oc-disc-lbl').textContent   = 'Réduction (' + _discLabel + ')';
    document.getElementById('oc-disc-val').textContent   = '-€' + _disc.toFixed(2).replace('.', ',');
  } else {
    document.getElementById('oc-disc-row').style.display = 'none';
  }
  document.getElementById('oc-total').textContent = total <= 0 ? 'GRATUIT' : '€' + total.toFixed(2).replace('.', ',');
  document.getElementById('pay-btn').textContent  = total <= 0 ? 'Activer gratuitement' : 'Payer €' + total.toFixed(2).replace('.', ',') + ' →';
}

// Run renderOrder immediately — DOM is already loaded (script is at bottom of body)
renderOrder();

// ── Auth ───────────────────────────────────────────────────────
function toast(m) { var e = document.getElementById('toast'); if(!e) return; e.textContent = m; e.classList.add('show'); clearTimeout(_tt); _tt = setTimeout(function(){ e.classList.remove('show'); }, 3000); }
function doLogout() { _sb.auth.signOut().then(function(){ window.location.href = '/'; }); }

async function run() {
  var r = await _sb.auth.getSession();
  if (!r.data.session) {
    // Save destination so we can come back after login
    sessionStorage.setItem('bm_after_login', window.location.href);
    window.location.href = '/login';
    return;
  }
  _u = r.data.session.user;
  var pr = await _sb.from('profiles').select('*').eq('id', _u.id).single();
  _p = pr.data || {};
}

run();

// ── Promo ──────────────────────────────────────────────────────
var PROMOS = {
  LAUNCH30:  { type:'percent', val:30, label:'-30%' },
  BIENVENUE: { type:'percent', val:20, label:'-20%' },
  AFRICA25:  { type:'percent', val:25, label:'-25%' },
  MINUS10:   { type:'fixed',   val:10, label:'-€10' },
  MOITIE50:  { type:'percent', val:50, label:'-50%' }
};

function togglePromo() {
  _promoOpen = !_promoOpen;
  document.getElementById('promo-body').classList.toggle('open', _promoOpen);
  document.getElementById('promo-arrow').textContent = _promoOpen ? '×' : '–';
}

function applyPromo() {
  var code = document.getElementById('promo-inp').value.trim().toUpperCase();
  var fb   = document.getElementById('promo-fb');
  var pr   = PROMOS[code];
  if (!pr) { fb.textContent = 'Code invalide.'; fb.className = 'promo-fb err'; return; }
  var base = (PRICES[_plan] || PRICES.annual).price;
  _disc      = pr.type === 'percent' ? Math.round(base * pr.val) / 100 : Math.min(pr.val, base);
  _discLabel = pr.label;
  fb.textContent = '✅ Réduction appliquée : ' + pr.label;
  fb.className   = 'promo-fb ok';
  renderOrder();
}

// ── Pay ────────────────────────────────────────────────────────
async function doPay() {
  var btn = document.getElementById('pay-btn');
  if (!_u) { toast('Connecte-toi d’abord'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Redirection…';

  var base  = (PRICES[_plan] || PRICES.annual).price;
  var total = Math.max(0, base - _disc);
  var chName = (_plan === 'unit' && _chId) ? (CH_NAMES[_chId] || _chId) : '';

  try {
    var resp = await fetch('/api/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        plan:          _plan,
        amount:        total,
        userId:        _u.id,
        email:         _u.email,
        challengeId:   _chId,
        challengeName: chName
      })
    });
    var data = await resp.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'Erreur Stripe');
    }
  } catch(e) {
    toast('Erreur : ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Réessayer';
  }
}
</script>
