<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon Journal &mdash; BOOST.ME</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:80px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nav-nm{font-size:.8rem;font-weight:600;color:#333}
.nav-pl{background:#FFF8E1;color:#E5AC00;font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem 'Poppins',sans-serif;cursor:pointer;color:#666}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(4,1fr);height:58px;z-index:100}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:'Poppins',sans-serif;cursor:pointer;transition:color .15s}
.bn.on,.bn:hover{color:#FFC107}.bni{font-size:1.1rem;line-height:1}
.pg{margin-top:68px;padding:1.25rem;max-width:700px;margin-left:auto;margin-right:auto}
.j-hero{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:16px;padding:1.5rem;margin-bottom:1.1rem}
.j-hero h1{font-size:1.1rem;font-weight:900;color:#fff;margin-bottom:.25rem}
.j-hero p{font-size:.76rem;color:rgba(255,255,255,.55);line-height:1.55}
.compose{background:#fff;border-radius:14px;padding:1.1rem;border:1px solid #E8E8E8;margin-bottom:.85rem}
.compose h3{font-size:.84rem;font-weight:800;margin-bottom:.75rem}
.mood-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
.mood-btn{padding:.35rem .75rem;border:1.5px solid #E2E2E2;border-radius:50px;font:700 .74rem 'Poppins',sans-serif;cursor:pointer;background:#fff;transition:all .15s}
.mood-btn.on{border-color:#FFC107;background:#FFF8E1;color:#E5AC00}
.tag-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.tag-btn{padding:.25rem .65rem;border:1.5px solid #E2E2E2;border-radius:50px;font:600 .68rem 'Poppins',sans-serif;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.tag-btn.on{border-color:#6366F1;background:#EEF2FF;color:#4338CA}
textarea{width:100%;padding:.75rem .9rem;border:1.5px solid #E2E2E2;border-radius:10px;font:400 .84rem 'Poppins',sans-serif;resize:vertical;min-height:110px;outline:none;background:#F8F8F8;transition:border-color .15s;line-height:1.65}
textarea:focus{border-color:#FFC107;background:#fff}
.compose-footer{display:flex;align-items:center;gap:.5rem;margin-top:.65rem}
.char-count{font-size:.68rem;color:#bbb;font-weight:600;flex-shrink:0}
.btn-submit{padding:.72rem 1.4rem;background:#FFC107;color:#111;font:800 .84rem 'Poppins',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;flex:1}
.btn-submit:hover{background:#E5AC00}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.ai-box{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:.85rem;display:none}
.ai-box.show{display:block}
.ai-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,193,7,.75);margin-bottom:.5rem}
.ai-text{font-size:.84rem;color:#fff;line-height:1.7;margin-bottom:.65rem}
.ai-action{background:rgba(255,193,7,.1);border-left:3px solid #FFC107;padding:.6rem .85rem;border-radius:0 8px 8px 0;font-size:.78rem;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:.65rem}
.ai-challenges{display:flex;gap:.4rem;flex-wrap:wrap}
.ai-ch-tag{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:4px;border:1px solid rgba(255,255,255,.12)}
.section-lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#bbb;margin-bottom:.6rem}
.entry{background:#fff;border-radius:12px;padding:.9rem 1rem;border:1px solid #E8E8E8;margin-bottom:.55rem}
.entry-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.45rem;flex-wrap:wrap}
.entry-mood{font-size:1rem}
.entry-date{font-size:.65rem;color:#bbb;font-weight:600}
.entry-tags{display:flex;gap:.25rem;flex-wrap:wrap;margin-left:auto}
.etag{background:#F3F4F6;color:#666;font-size:.58rem;font-weight:700;padding:.1rem .38rem;border-radius:4px}
.entry-text{font-size:.8rem;color:#333;line-height:1.65;margin-bottom:.5rem}
.entry-ai{background:#FAFAFA;border-left:3px solid #FFC107;padding:.55rem .75rem;border-radius:0 8px 8px 0}
.entry-ai-lbl{font-size:.55rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#FFC107;margin-bottom:.2rem}
.entry-ai-txt{font-size:.76rem;color:#444;line-height:1.6}
.spin{width:16px;height:16px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:.35rem}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.empty{text-align:center;padding:1.5rem;color:#bbb;font-size:.82rem}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<nav class="nav"><a href="/" style="text-decoration:none;display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;background:#111;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#FFC107;font-weight:900;font-size:11px;font-family:Poppins,sans-serif;letter-spacing:-0.5px">BM</span></div><span style="font:900 15px/1 Poppins,sans-serif;color:#111;letter-spacing:0.5px">BOOST<span style="color:#FFC107">.ME</span></span></a><div class="nav-r"><span class="nav-nm" id="nav-nm"></span><span class="nav-pl" id="nav-pl">Starter</span><button class="btn-sm" onclick="doLogout()">Quitter</button></div></nav>
<div class="pg">
<div class="j-hero"><h1>&#128221; Mon Journal</h1><p>Exprime ce que tu vis. L'IA analyse ton texte et te propose des insights et des challenges adaptés.</p></div>
<div class="compose"><h3>Nouvelle entrée</h3><div class="mood-row"><button class="mood-btn" data-mood="super" data-ico=":-)" onclick="selMood(this)">&#128513; Super</button><button class="mood-btn" data-mood="bien" data-ico=":-)" onclick="selMood(this)">&#128522; Bien</button><button class="mood-btn" data-mood="neutre" data-ico=":-|" onclick="selMood(this)">&#128528; Neutre</button><button class="mood-btn" data-mood="difficile" data-ico=":-(" onclick="selMood(this)">&#128532; Difficile</button><button class="mood-btn" data-mood="motiv" data-ico=":D" onclick="selMood(this)">&#128165; Motivé(e)</button></div><div class="tag-row"><button class="tag-btn" data-tag="finances" onclick="togTag(this)">&#128176; Finances</button><button class="tag-btn" data-tag="confiance" onclick="togTag(this)">&#128170; Confiance</button><button class="tag-btn" data-tag="travail" onclick="togTag(this)">&#128188; Travail</button><button class="tag-btn" data-tag="relations" onclick="togTag(this)">&#10084; Relations</button><button class="tag-btn" data-tag="sante" onclick="togTag(this)">&#128154; Santé</button><button class="tag-btn" data-tag="famille" onclick="togTag(this)">&#128106; Famille</button><button class="tag-btn" data-tag="projets" onclick="togTag(this)">&#127919; Projets</button><button class="tag-btn" data-tag="mental" onclick="togTag(this)">&#129504; Mental</button></div><textarea id="j-input" placeholder="Qu'est-ce qui occupe ton esprit aujourd'hui ? Comment tu te sens ?&#10;&#10;L'IA va analyser ce que tu écris et te proposer des conseils personnalisés."></textarea><div class="compose-footer"><button class="btn-submit" id="j-btn" onclick="submitEntry()">&#9889; Analyser et enregistrer</button><span class="char-count" id="char-cnt">0 / 1000</span></div></div>
<div class="ai-box" id="ai-box"><div class="ai-lbl">&#127775; Insights de l'IA pour toi</div><div class="ai-text" id="ai-text"></div><div class="ai-action" id="ai-action"></div><div class="ai-challenges" id="ai-challenges"></div></div>
<div class="section-lbl">Tes entrées récentes</div><div id="entries-list"><div class="empty"><span class="spin"></span> Chargement…</div></div></div>
<nav class="bnav"><a class="bn" href="/dashboard"><span class="bni">🏠</span>Accueil</a><a class="bn" href="/challenges"><span class="bni">🎯</span>Challenges</a><a class="bn" href="/challenge-day"><span class="bni">⚡</span>En cours</a><a class="bn" href="/mon-espace"><span class="bni">👤</span>Moi</a></nav>
<div class="toast" id="toast"></div>
<script>
var _sb = window.supabase.createClient("https://hddxbjmdtbxvxwmmdxmj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ");
var GROQ_KEY = "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";
var _u = null, _p = null, _tt;
var _mood = '', _moodIco = '', _tags = [];

function toast(m) {
  var e = document.getElementById('toast');
  if (!e) return;
  e.textContent = m;
  e.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function() { e.classList.remove('show'); }, 3000);
}
function doLogout() { _sb.auth.signOut().then(function() { window.location.href = '/'; }); }

function selMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  _mood = btn.getAttribute('data-mood');
  _moodIco = btn.getAttribute('data-ico');
}

function togTag(btn) {
  btn.classList.toggle('on');
  var tag = btn.getAttribute('data-tag');
  if (btn.classList.contains('on')) {
    if (_tags.indexOf(tag) < 0) _tags.push(tag);
  } else {
    _tags = _tags.filter(function(t) { return t !== tag; });
  }
}

document.getElementById('j-input').addEventListener('input', function() {
  document.getElementById('char-cnt').textContent = this.value.length + ' / 1000';
});

async function submitEntry() {
  var txt = document.getElementById('j-input').value.trim();
  if (txt.length < 20) { toast("Ecris au moins quelques phrases."); return; }
  if (!_u) { toast("Connecte-toi d'abord"); return; }

  var btn = document.getElementById('j-btn');
  btn.textContent = 'Analyse en cours...';
  btn.disabled = true;

  // Build prompt safely using array join — NO quote nesting issues
  var promptParts = [];
  promptParts.push("Tu es un coach bienveillant. Utilisateur BOOST.ME: " + ((_p && _p.prenom) ? _p.prenom : "Membre") + ".");
  if (_mood) promptParts.push("Humeur: " + _mood + ".");
  if (_tags.length) promptParts.push("Themes: " + _tags.join(", ") + ".");
  promptParts.push("Entree journal: " + txt.substring(0, 800));
  promptParts.push("Donne: (1) insight percutant 2-3 phrases en tutoyant, (2) action concrete, (3) 2 challenges parmi: Glow Up, Cash Clarity, Mental Detox, Morning Power, Unshakeable Confidence, Body Reset, Build Your Brand, Side Hustle Starter, Own The Room, Deep Work Mode, Network Like a Pro, Read & Lead.");
  promptParts.push('Reponds en JSON UNIQUEMENT sans markdown: {"insight":"...","action":"...","challenges":["...","..."]}');
  var prompt = promptParts.join(" ");

  var ai = { insight: '', action: '', challenges: [] };

  try {
    var resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: prompt }],
        max_tokens: 500,
        temperature: 0.8
      })
    });
    if (!resp.ok) throw new Error("Groq " + resp.status);
    var data = await resp.json();
    var raw = (data.choices && data.choices[0] && data.choices[0].message) ? data.choices[0].message.content.trim() : "";
    var m = raw.match(/\{[\s\S]*\}/);
    if (m) { try { ai = JSON.parse(m[0]); } catch(e) {} }
  } catch(err) {
    console.error("Groq error:", err.message);
    ai.insight = "Merci pour cette entree. Continue a te confier a ton journal.";
    ai.action = "Prends 5 minutes pour relire ce que tu as ecrit.";
  }

  // Save to Supabase
  var saveRes = await _sb.from("journal_entries").insert({
    user_id:       _u.id,
    text:          txt,
    mood:          _mood,
    mood_ico:      _moodIco,
    tags:          _tags,
    ai_insight:    ai.insight || "",
    ai_action:     ai.action  || "",
    ai_challenges: ai.challenges || [],
    created_at:    new Date().toISOString()
  });
  if (saveRes.error) {
    toast("Erreur sauvegarde: " + saveRes.error.message);
    console.error("insert error:", saveRes.error);
  } else {
    toast("Entree enregistree !");
  }

  // Show AI box
  if (ai.insight) {
    document.getElementById('ai-text').textContent = ai.insight;
    document.getElementById('ai-action').textContent = "Action : " + (ai.action || "");
    var chHtml = (ai.challenges || []).map(function(c) {
      return '<span class="ai-ch-tag">' + c + '</span>';
    }).join("");
    document.getElementById('ai-challenges').innerHTML = chHtml;
    document.getElementById('ai-box').classList.add('show');
  }

  // Reset
  document.getElementById('j-input').value = '';
  document.getElementById('char-cnt').textContent = '0 / 1000';
  document.querySelectorAll('.mood-btn').forEach(function(b) { b.classList.remove('on'); });
  document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('on'); });
  _mood = ''; _moodIco = ''; _tags = [];
  btn.textContent = 'Analyser et enregistrer';
  btn.disabled = false;
  loadEntries();
}

async function loadEntries() {
  if (!_u) return;
  var res = await _sb.from("journal_entries")
    .select("*").eq("user_id", _u.id)
    .order("created_at", { ascending: false }).limit(10);
  var list = res.data || [];
  var el = document.getElementById('entries-list');
  if (!list.length) { el.innerHTML = '<div class="empty">Ton journal est vide. Ecris ta premiere entree ci-dessus.</div>'; return; }
  var html = '';
  list.forEach(function(e) {
    var dt = new Date(e.created_at).toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    var tagsHtml = (e.tags || []).map(function(t) { return '<span class="etag">' + t + '</span>'; }).join('');
    html += '<div class="entry">';
    html += '<div class="entry-top"><span class="entry-mood">' + (e.mood_ico || '') + '</span>';
    html += '<span class="entry-date">' + dt + '</span>';
    if (tagsHtml) html += '<div class="entry-tags">' + tagsHtml + '</div>';
    html += '</div>';
    html += '<div class="entry-text">' + e.text.substring(0, 280) + (e.text.length > 280 ? '...' : '') + '</div>';
    if (e.ai_insight) {
      html += '<div class="entry-ai"><div class="entry-ai-lbl">Conseil IA</div>';
      html += '<div class="entry-ai-txt">' + e.ai_insight + '</div></div>';
    }
    html += '</div>';
  });
  el.innerHTML = html;
}

async function run() {
  var r = await _sb.auth.getSession();
  if (!r.data.session) { window.location.href = '/login'; return; }
  _u = r.data.session.user;
  var pr = await _sb.from("profiles").select("*").eq("id", _u.id).single();
  _p = pr.data || {};
  var nn = document.getElementById('nav-nm'); if (nn) nn.textContent = _p.prenom || '';
  var pl = document.getElementById('nav-pl');
  if (pl) { var lb = { free:'Starter', unit:'Challenge', annual:'Annuel' }; pl.textContent = lb[_p.plan||'free'] || 'Starter'; }
  loadEntries();
}

run();

</script>
</body></html>
