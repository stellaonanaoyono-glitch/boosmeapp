<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact &#8212; BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#F2F2F2;min-height:100vh}
.top{background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.top img{height:34px;width:auto;object-fit:contain}
.bk{font-size:.8rem;font-weight:600;color:#666;text-decoration:none}
.bk:hover{color:#111}
.pg{max-width:520px;margin:0 auto;padding:2rem 1.25rem}
h1{font-size:1.3rem;font-weight:900;margin-bottom:.3rem}
.sub{font-size:.82rem;color:#666;margin-bottom:2rem;line-height:1.6}
.card{background:#fff;border-radius:16px;padding:1.75rem;border:1px solid #E2E2E2}
label{display:block;font-size:.73rem;font-weight:700;color:#444;margin-bottom:.3rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
input,select,textarea{width:100%;padding:.72rem .95rem;border:1.5px solid #E2E2E2;border-radius:10px;font:400 .88rem Poppins,sans-serif;outline:none;background:#F8F8F8;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#FFC107;background:#fff}
textarea{resize:vertical;min-height:110px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.btn{width:100%;padding:.88rem;background:#FFC107;color:#111;font:700 .9rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;margin-top:1.1rem;transition:all .2s}
.btn:hover{background:#E5AC00}.btn:disabled{background:#ccc;cursor:not-allowed}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.82rem;margin-top:.85rem;display:none}
.msg.ok{background:#D1FAE5;color:#065F46;display:block}
.msg.err{background:#FEE2E2;color:#991B1B;display:block}
.info{background:#FFF8E1;border-radius:10px;padding:.9rem 1.1rem;margin-top:1.25rem;font-size:.8rem;color:#666;line-height:1.65}
.info strong{color:#111;font-weight:700}
@media(max-width:480px){.r2{grid-template-columns:1fr}}
</style>
</head>

<div class="pg"><h1>Nous contacter</h1><p class="sub">Une question ou un problème ? On te répond dans les 24h.</p><div class="card"><div class="r2"><div><label>Prénom *</label><input id="cpn" type="text" placeholder="Marie"></div><div><label>Nom</label><input id="cnm" type="text" placeholder="Ngo"></div></div><label>Email *</label><input id="cem" type="email" placeholder="marie@email.com"><label>Sujet</label><select id="csj"><option value="">Sélectionner&#8230;</option><option>Question sur mon abonnement</option><option>Problème technique</option><option>Suggestion d'amélioration</option><option>Partenariat</option><option>Autre</option></select><label>Message *</label><textarea id="cms" placeholder="Décris ta question&#8230;"></textarea><button class="btn" id="cbtn" onclick="send()">Envoyer le message</button><div id="cfb" class="msg"></div></div><div class="info"><strong>Email :</strong> hello@boostme.social<br><strong>Réponse :</strong> sous 24h en jours ouvrables</div></div>
<script>
function send(){
  var pn=document.getElementById("cpn").value.trim();
  var em=document.getElementById("cem").value.trim();
  var ms=document.getElementById("cms").value.trim();
  var fb=document.getElementById("cfb"),btn=document.getElementById("cbtn");
  fb.className="msg";
  if(!pn||!em||!ms){fb.className="msg err";fb.textContent="Remplis les champs obligatoires.";return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){fb.className="msg err";fb.textContent="Email invalide.";return;}
  btn.textContent="Envoi...";btn.disabled=true;
  setTimeout(function(){
    btn.textContent="Envoyer le message";btn.disabled=false;
    fb.className="msg ok";
    fb.textContent="\u2705 Message envoy\u00e9 ! R\u00e9ponse sous 24h \u00e0 "+em+".";
    document.getElementById("cpn").value="";
    document.getElementById("cem").value="";
    document.getElementById("cms").value="";
  },1200);
}
</script>
