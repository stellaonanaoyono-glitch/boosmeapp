<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Challenge du jour &#8212; BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nav-nm{font-size:.8rem;font-weight:600;color:#333;display:none}
.nav-pl{background:#FFF8E1;color:#E5AC00;font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem Poppins,sans-serif;cursor:pointer;color:#666}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(5,1fr);height:58px;z-index:100}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:Poppins,sans-serif;cursor:pointer;transition:color .15s}
.bn.on,.bn:hover{color:#FFC107}.bni{font-size:1.1rem;line-height:1}
.pg{margin-top:60px;padding:1.5rem 1.25rem;max-width:860px;margin-left:auto;margin-right:auto}
.by{display:inline-flex;align-items:center;justify-content:center;padding:.78rem 1.4rem;background:#FFC107;color:#111;font:700 .86rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.by:hover{background:#E5AC00}.by:disabled{background:#ccc;color:#888;cursor:not-allowed}
.bg2{display:inline-flex;align-items:center;padding:.65rem 1.1rem;background:none;color:#666;font:600 .8rem Poppins,sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;text-decoration:none}
.bg2:hover{border-color:#111;color:#111}
.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
@media(min-width:600px){.nav-nm{display:block}}
.cd-header{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:16px;padding:1.35rem;margin-bottom:1.1rem;position:relative;overflow:hidden}
.cd-header::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,193,7,.08),transparent 65%);pointer-events:none}
.cd-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,193,7,.85);margin-bottom:.4rem}
.cd-title{font-size:1rem;font-weight:800;color:#fff;margin-bottom:.2rem}
.cd-sub{font-size:.75rem;color:rgba(255,255,255,.72);margin-bottom:.85rem}
.prog-bg{background:rgba(255,255,255,.1);border-radius:50px;height:5px;overflow:hidden;margin-bottom:.35rem}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#FFC107,#E5AC00)}
.prog-meta{display:flex;justify-content:space-between;font-size:.68rem;color:rgba(255,255,255,.35)}
.phase-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.25);color:#FFC107;font-size:.68rem;font-weight:700;padding:.2rem .6rem;border-radius:4px;margin-top:.6rem}
.card{background:#fff;border-radius:14px;padding:1.1rem 1.15rem;border:1px solid #E2E2E2;margin-bottom:.85rem}
.sec-label{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:.55rem}
.sl-l{color:#FFC107}.sl-a{color:#22C55E}.sl-b{color:#6366F1}.sl-q{color:#EC4899}
.card h3{font-size:.9rem;font-weight:800;margin-bottom:.45rem;line-height:1.35;color:#111}
.card p{font-size:.82rem;color:#444;line-height:1.75}
.booster-card{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:14px;padding:1.1rem 1.15rem;margin-bottom:.85rem;border-left:3px solid #6366F1}
.booster-card .bl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(99,102,241,.7);margin-bottom:.5rem}
.booster-card p{font-size:.95rem;font-style:italic;color:#fff;line-height:1.55;font-weight:600}
.alt-btn{width:100%;margin-top:.85rem;padding:.72rem 1rem;background:#F0FDF4;border:1.5px dashed #22C55E;border-radius:10px;font:600 .78rem Poppins,sans-serif;cursor:pointer;color:#22C55E;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .15s}
.alt-btn:hover{background:#D1FAE5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:500px}
.modal-sheet h3{font-size:1rem;font-weight:800;margin-bottom:.3rem}
.modal-sheet .ms-sub{font-size:.82rem;color:#666;margin-bottom:1rem;line-height:1.55}
.modal-sheet textarea{width:100%;padding:.72rem .9rem;border:1.5px solid #E2E2E2;border-radius:10px;font:400 .84rem Poppins,sans-serif;resize:vertical;min-height:80px;outline:none;background:#F8F8F8}
.modal-sheet textarea:focus{border-color:#22C55E;background:#fff}
.val-section{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid #E2E2E2;margin-bottom:.85rem}
.val-section h4{font-size:.9rem;font-weight:800;margin-bottom:.7rem}
.val-section textarea{width:100%;padding:.72rem .9rem;border:1.5px solid #E2E2E2;border-radius:10px;font:400 .84rem Poppins,sans-serif;resize:vertical;min-height:80px;outline:none;background:#F8F8F8}
.val-section textarea:focus{border-color:#FFC107;background:#fff}
.end-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:1.25rem}
.end-modal-bg.open{display:flex}
.end-card{background:#fff;border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:420px;text-align:center}
.end-ico{font-size:3rem;display:block;margin-bottom:.75rem}
.end-card h2{font-size:1.15rem;font-weight:900;margin-bottom:.4rem}
.end-card p{font-size:.84rem;color:#666;line-height:1.65;margin-bottom:1.25rem}
.end-btns{display:flex;flex-direction:column;gap:.55rem}
.loading-zone{display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;background:#FFFAEC;border-radius:10px;font-size:.8rem;color:#666;border:1px solid rgba(255,193,7,.2);margin-bottom:.85rem}
</style>
</head>

var STARTER_CONTENT=[{"day": 1, "phase": "Wake Up", "title": "Qui es-tu vraiment aujourd'hui ?", "lesson_title": "La conscience de soi comme levier de transformation", "lesson_body": "La plupart des transformations échouent non pas par manque de volonté, mais par manque de clarté sur le point de départ. Tasha Eurich, chercheuse en psychologie organisationnelle (2018), a montré dans une étude portant sur 5 000 personnes que seulement 10 à 15% des individus se voient réellement tels qu'ils sont. Les 85% restants fonctionnent avec une image floue ou biaisée d'eux-mêmes. Ce n'est pas un défaut de caractère — c'est un angle mort cognitif que tout le monde partage. Aujourd'hui, tu ne changes rien. Tu observes. Avec la même bienveillance que tu aurais pour quelqu'un que tu aimes profondément.", "action_title": "L'audit honnête en 3 dimensions", "action_body": "Prends 15 minutes seul(e), dans un endroit calme. Sur une feuille ou ton téléphone, note honnêtement : (1) Une chose que tu fais vraiment bien et que tu sous-estimes. (2) Une habitude qui te coûte de l'énergie chaque jour. (3) Une chose que tu repousses depuis trop longtemps. Pas de jugement — juste des faits. Ce sont tes données de départ.", "booster": "Je pars de là où je suis. C'est exactement le bon endroit.", "question": "Si tu devais décrire ta version idéale dans 6 mois en 3 mots, quels seraient-ils ?"}, {"day": 2, "phase": "Wake Up", "title": "Ton énergie est ta première ressource", "lesson_title": "La science du sommeil et de la performance personnelle", "lesson_body": "Le Dr Matthew Walker, neuroscientifique à l'Université de Californie Berkeley et auteur de Why We Sleep (2017), a démontré que le manque chronique de sommeil réduit les capacités cognitives, émotionnelles et physiques de façon mesurable — comparable à une ivresse légère. Plus frappant encore : une étude du Journal of Clinical Sleep Medicine (2021) prouve que la qualité du sommeil est le prédicteur numéro un de l'apparence perçue par les autres, avant le maquillage, les vêtements ou la coiffure. Ton énergie ne se construit pas dans une salle de sport. Elle se construit la nuit. Et tout le reste en dépend.", "action_title": "L'audit de ton sommeil des 7 derniers jours", "action_body": "10 minutes. Note pour chacun des 7 derniers jours : l'heure approximative de coucher, l'heure de réveil, et une note sur 10 de comment tu te sentais le matin. Un tableau simple — papier ou notes. À la fin, calcule ta moyenne de sommeil et ta moyenne d'énergie matinale. Ce tableau est ta baseline. Tu y reviendras au Jour 7.", "booster": "Mon énergie est ma première beauté. Je la protège.", "question": "À quoi sacrifies-tu ton sommeil ? Et est-ce que ça en vaut vraiment le prix ?"}, {"day": 3, "phase": "Wake Up", "title": "Ce que ton corps dit avant toi", "lesson_title": "La posture comme outil neurologique de confiance", "lesson_body": "Amy Cuddy, psychologue sociale à Harvard, a publié en 2010 une recherche qui a changé la façon dont on comprend le corps et la confiance : la posture physique influence directement les niveaux de cortisol (hormone du stress) et de testostérone en seulement 2 minutes. Mais au-delà de la chimie, la posture envoie un signal constant à ton propre cerveau : 'je suis en sécurité, je suis capable, j'ai ma place ici.' Ce signal change ta voix, ton regard, ta façon d'entrer dans une pièce — et donc la façon dont les autres te perçoivent. Ton corps parle avant que tu ouvres la bouche. Aujourd'hui, tu écoutes ce qu'il dit.", "action_title": "La vidéo de 30 secondes qui révèle tout", "action_body": "20 minutes. Filme-toi 30 secondes de dos puis de profil en marchant normalement dans une pièce. Regarde la vidéo sans te juger — observe uniquement : la position de tes épaules, l'alignement de ta tête, comment tes bras bougent. Note une seule chose à améliorer. Puis pratique 5 minutes : tiens-toi dos à un mur, talons, fessiers, épaules et nuque en contact. 3 fois 1 minute. Note comment tu te sens après.", "booster": "Mon corps est mon premier message au monde. Je le choisis.", "question": "Dans quelles situations as-tu tendance à te faire toute petite ? Qu'est-ce que tu essaies d'éviter en le faisant ?"}, {"day": 4, "phase": "Build", "title": "Installe la fondation — ta routine de 5 minutes", "lesson_title": "La régularité comme prédicteur de transformation durable", "lesson_body": "Phillippa Lally, chercheuse en psychologie de la santé à l'University College London, a publié en 2010 dans le European Journal of Social Psychology une étude fondamentale : il faut en moyenne 66 jours pour qu'un nouveau comportement devienne automatique — pas 21, contrairement au mythe populaire. Mais la même étude révèle quelque chose de crucial : rater une ou deux fois n'interrompt pas la formation de l'habitude. Ce qui compte, c'est la régularité globale, pas la perfection quotidienne. Une routine de 5 minutes faite chaque jour pendant 30 jours crée des changements neurologiques mesurables. La durée importe moins que la constance.", "action_title": "Construis ta routine de 5 minutes dès ce soir", "action_body": "25 minutes au total. Conçois une routine personnelle de 5 minutes que tu peux faire chaque matin sans exception — même les jours difficiles. Elle doit contenir exactement 4 éléments dans cet ordre : (1) un grand verre d'eau au réveil, (2) 1 minute d'étirements debout, (3) une phrase d'intention dite à voix haute — ce que tu veux ressentir aujourd'hui, (4) une chose qui te plaît (café, musique, lumière du jour). Écris-la. Prépare-la ce soir pour demain matin.", "booster": "La régularité fait plus que la perfection. Tous les jours, même imparfaitement.", "question": "Quelle est la chose la plus simple que tu pourrais faire chaque matin pour commencer ta journée différemment ?"}, {"day": 5, "phase": "Build", "title": "Le discours qui te construit ou te détruit", "lesson_title": "L'auto-dialogue comme déterminant de la performance", "lesson_body": "Ethan Kross, psychologue à l'Université du Michigan et auteur de Chatter (2021), a démontré que la façon dont nous nous parlons intérieurement est le déterminant le plus puissant de notre résilience et de nos performances. Plus précisément, l'auto-dialogue à la deuxième ou troisième personne — 'tu peux le faire' ou 'elle est capable' — est significativement plus efficace que la première personne pour réguler les émotions sous pression. Ce n'est pas de l'affirmation positive naïve. C'est de la neurologie cognitive : la distance psychologique créée par le changement de personne active les circuits de régulation émotionnelle comme si tu conseillais un ami.", "action_title": "1 heure d'observation de ton discours intérieur", "action_body": "30 minutes étalées sur la journée. Pendant 1 heure aujourd'hui, observe ton discours intérieur comme un chercheur observerait un sujet. Chaque fois que tu te parles négativement — 'je suis nulle', 'ça ne marchera pas', 'je suis trop...' — note-le sur ton téléphone. Puis réécris chaque phrase à la deuxième personne, avec bienveillance et réalisme. Exemple : 'Tu traverses quelque chose de difficile. Et tu continues quand même.' En fin de journée, compte : combien de fois t'es-tu parlé négativement ? Le chiffre seul est déjà une révélation.", "booster": "Je suis mon alliée. D'abord et avant tout.", "question": "Si tu traitais tes amies comme tu te traites toi-même, les garderais-tu ?"}, {"day": 6, "phase": "Push", "title": "Fais une chose qui te fait peur", "lesson_title": "L'inconfort comme signal de croissance, pas de danger", "lesson_body": "Carol Dweck, professeure de psychologie à Stanford University, a développé dans ses recherches publiées depuis 2006 le concept de 'growth mindset' — l'état d'esprit de croissance. Son insight central : les personnes qui interprètent l'inconfort et la difficulté comme des signaux d'apprentissage plutôt que de danger développent une résilience, une créativité et des performances significativement supérieures sur le long terme. La zone de confort ne disparaît pas — elle s'élargit. Chaque fois que tu agis malgré l'inconfort, tu recalibres ton seuil de peur. Ce qui te terrifiait hier devient banal demain. Pas parce que c'est devenu plus facile — parce que tu es devenu(e) plus grand(e) que ta peur.", "action_title": "L'action qui fait peur — 20 minutes pour la faire", "action_body": "Identifie une chose que tu repousses depuis au moins une semaine par inconfort : un message à envoyer, un appel à passer, une décision à prendre, quelque chose à dire. Une seule chose. Donne-toi 20 minutes maintenant pour la faire. Pas pour qu'elle soit parfaite. Juste pour qu'elle soit faite. Note après comment tu te sens — l'énergie qui suit l'action courageuse est mesurable et réelle.", "booster": "Mon inconfort est la preuve que je grandis. Je continue.", "question": "Qu'est-ce que tu ferais différemment si tu savais que tu ne pouvais pas échouer ?"}, {"day": 7, "phase": "Own It", "title": "Tu l'as fait — mesure ce qui a changé", "lesson_title": "L'engagement public comme multiplicateur de transformation", "lesson_body": "Une étude de l'American Society of Training and Development citée par les chercheurs en psychologie du comportement montre que la probabilité de réaliser un objectif passe à 65% quand on le partage avec quelqu'un, et à 95% quand on s'engage publiquement avec une date et un témoin. Ce n'est pas de la pression sociale négative — c'est de l'ancrage comportemental. En partageant ta progression, tu actives trois mécanismes simultanément : la cohérence (rester aligné(e) avec ce qu'on a annoncé), la responsabilité sociale (ne pas décevoir), et l'identité (se voir et être vu comme quelqu'un qui agit). Tu viens de passer 7 jours à te choisir. Ça mérite d'être dit.", "action_title": "Le bilan en 5 phrases et le premier partage", "action_body": "20 minutes. Reprends le tableau du Jour 2 (audit du sommeil) et compare avec cette semaine. Puis écris en 5 phrases : (1) Ce que tu as découvert sur toi. (2) Une habitude que tu as installée. (3) Un moment dont tu es fier(ère). (4) Ce que tu vas continuer. (5) Ce que tu vas changer. Partage ce bilan — à une amie, dans un groupe, sur tes réseaux, ou dans un journal. L'acte d'écrire et de partager ancre la transformation.", "booster": "7 jours. Je me suis choisie. Je continue de me choisir.", "question": "Qu'est-ce que tu veux dire à la personne que tu étais il y a 7 jours ?"}];

async function loadContent(){

    var idx=_uc.current_day-1;
    if(idx>=0&&idx<STARTER_CONTENT.length){
      _c=STARTER_CONTENT[idx];
      renderContent(_c);
      return;

  var ex=await _sb.from('daily_content').select('*')
    .eq('user_id',_u.id).eq('challenge_id',_uc.challenge_id).eq('day_number',_uc.current_day)
    .maybeSingle();

  await generateContent();
}

             'pousser les limites, actions exigeantes, diff\u00e9rence \u00e9lev\u00e9e',
             'consolider, ancrer, mesurer, diff\u00e9rence maximum'][Math.min(weeks-1,3)];
  var prompt='Coach expert, rigoureux, bienveillant. Challenge "'+_ch.name+'" ('+_ch.cat+'), Jour '+_uc.current_day+'/'+_ch.dur+', Semaine '+weeks+': '+phCtx+'. Utilisateur: '+(_p.prenom||'Membre')+'. JSON UNIQUEMENT sans markdown:\n{"day_title":"Titre \u00e9nergisant max 8 mots","lesson_title":"Titre le\u00e7on","lesson_body":"Le\u00e7on 120-150 mots avec 1 source scientifique cit\u00e9e (auteur, institution, ann\u00e9e)","action_title":"Titre action","action_body":"Action concr\u00e8te 80-100 mots avec dur\u00e9e pr\u00e9cise","action_objective":"Objectif p\u00e9dagogique invisible 30 mots","booster":"Mantra court max 12 mots","question":"Question de r\u00e9flexion profonde"}';
  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:900,temperature:0.85})});
    var d=await resp.json();
    if(!d.choices||!d.choices[0])throw new Error('no resp');
    var raw=d.choices[0].message.content.trim();
    var m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    var c=JSON.parse(m[0]);
    await _sb.from('daily_content').upsert({user_id:_u.id,challenge_id:_uc.challenge_id,day_number:_uc.current_day,
      lesson_title:c.lesson_title,lesson_body:c.lesson_body,action_title:c.action_title,action_body:c.action_body,
      question:c.question,day_title:c.day_title,action_objective:c.action_objective,booster:c.booster});
    _c=c; renderContent(c);
  }catch(e){
    document.getElementById('content-zone').innerHTML='<div class="loading-zone" style="background:#FEF3C7">Erreur g\u00e9n\u00e9ration. <button onclick="generateContent()" style="background:none;border:none;color:#E5AC00;font-weight:700;cursor:pointer;font-family:inherit;margin-left:.4rem">R\u00e9essayer</button></div>';
  }
}

function renderContent(c){
  var prenom=(_p&&_p.prenom)?', '+_p.prenom:'';
  document.getElementById('content-zone').innerHTML=
    '<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#bbb;margin-bottom:.25rem">Jour '+_uc.current_day+'</div>'
    +'<div style="font-size:1.15rem;font-weight:900;color:#111;line-height:1.25">'+c.day_title+'</div></div>'
    +'<div class="card"><div class="sec-label sl-l">&#128214; La le\u00e7on du jour</div>'
    +'<h3>'+c.lesson_title+'</h3><p>'+c.lesson_body+'</p></div>'
    +'<div class="card" id="action-section">'
    +'<div class="sec-label sl-a">&#9889; L\'action du jour</div>'
    +'<h3>'+c.action_title+'</h3><p>'+c.action_body+'</p>'
    +'<button class="alt-btn" onclick="openAlt()">&#128260; Cette action ne m\'est pas possible aujourd\'hui &rarr; L\'IA adapte</button>'
    +'<div id="alt-result"></div></div>'
    +'<div class="booster-card"><div class="bl">&#128293; Le Booster</div>'
    +'<p>\u201c'+c.booster+'\u201d</p></div>'
    +'<div class="card"><div class="sec-label sl-q">&#127891; Question du soir</div>'
    +'<p style="font-style:italic;font-size:.9rem;color:#333;line-height:1.65">'+c.question+'</p></div>'
    +'<button class="bg2" onclick="regenContent()" style="width:100%;justify-content:center;margin-bottom:.5rem">&#8635; R\u00e9g\u00e9n\u00e9rer</button>';
}

function openAlt(){document.getElementById('alt-modal').classList.add('open');}
function closeAlt(){document.getElementById('alt-modal').classList.remove('open');}

async function genAlt(){
  var constraint=document.getElementById('alt-input').value.trim();
  if(!constraint){toast('D\u00e9cris ta contrainte pour adapter l\'action.');return;}
  var btn=document.getElementById('alt-btn');btn.textContent='\u23f3 G\u00e9n\u00e9ration...';btn.disabled=true;
  var obj=(_c&&_c.action_objective)||('objectif du jour '+_uc.current_day+' du challenge '+_ch.name);
  var prompt='Coach expert. Contrainte: "'+constraint+'". Objectif p\u00e9dagogique immuable: '+obj+'. G\u00e9n\u00e8re une action alternative qui respecte le m\u00eame objectif et s\'adapte \u00e0 la contrainte. JSON: {"alt_title":"...","alt_body":"description 60-80 mots","encouragement":"phrase courte motivante max 20 mots"}';
  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:400,temperature:0.8})});
    var d=await resp.json();
    var raw=d.choices[0].message.content.trim();
    var m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    var alt=JSON.parse(m[0]);
    closeAlt();
    document.getElementById('alt-result').innerHTML='<div style="background:#F0FDF4;border-radius:10px;padding:.9rem 1rem;margin-top:.85rem;border:1.5px solid #22C55E">'
      +'<div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#22C55E;margin-bottom:.4rem">&#10003; Action adapt\u00e9e</div>'
      +'<div style="font-size:.88rem;font-weight:700;margin-bottom:.3rem">'+alt.alt_title+'</div>'
      +'<p style="font-size:.8rem;color:#444;line-height:1.65">'+alt.alt_body+'</p>'
      +'<p style="font-size:.76rem;color:#22C55E;font-style:italic;margin-top:.4rem;font-weight:600">'+alt.encouragement+'</p></div>';
    document.getElementById('alt-input').value='';
  }catch(e){toast('Erreur. R\u00e9essaie.');}
  btn.textContent='\u26a1 G\u00e9n\u00e9rer l\'alternative';btn.disabled=false;
}

function renderValidation(){
  document.getElementById('val-zone').innerHTML=
    '<div class="val-section"><h4>&#10003; Valider le Jour '+_uc.current_day+'</h4>'
    +'<textarea id="ref-txt" placeholder="Ta r\u00e9flexion du jour \u2014 optionnel\u2026"></textarea>'
    +'<button class="by" onclick="validateDay()" style="width:100%;margin-top:.75rem">Marquer comme fait \u2192</button></div>'
    +'<a class="bg2" href="/dashboard" style="width:100%;justify-content:center;margin-bottom:1rem">\u2190 Tableau de bord</a>';
}

async function validateDay(){
  var refVal=document.getElementById('ref-txt')?document.getElementById('ref-txt').value.trim():'';
  await _sb.from('daily_validations').upsert({user_id:_u.id,challenge_id:_uc.challenge_id,day_number:_uc.current_day,reflection:refVal,validated_at:new Date().toISOString()},{onConflict:'user_id,challenge_id,day_number'});
  var newDay=_uc.current_day+1,newStreak=(_uc.streak||0)+1,done=newDay>_ch.dur;
  await _sb.from('user_challenges').update({current_day:newDay,streak:newStreak,last_active:new Date().toISOString(),status:done?'completed':'active',completed_at:done?new Date().toISOString():null}).eq('id',_uc.id);
  if(done){
    var certNum='BM-'+Date.now().toString(36).toUpperCase();
    await _sb.from('certificats').upsert({user_id:_u.id,challenge_id:_uc.challenge_id,challenge_name:_ch.name,days_completed:_ch.dur,final_streak:newStreak,completed_at:new Date().toISOString(),cert_number:certNum},{onConflict:'user_id,challenge_id'});
    var isStarter=_uc.challenge_id==='boostme-starter';
    document.getElementById('end-ico').textContent=isStarter?'\ud83c\udf89':'\ud83c\udfc6';
    document.getElementById('end-title').textContent=isStarter?'Starter termin\u00e9\u00a0!':'Challenge termin\u00e9\u00a0!';
    document.getElementById('end-msg').textContent=isStarter?'Tu as fait les 7 jours\u00a0! Ton certificat est dans Mon Espace. Choisis ton prochain challenge ou passe au plan annuel pour tout d\u00e9bloquer.':'F\u00e9licitations\u00a0! '+_ch.dur+' jours boulis. Ton certificat est dans Mon Espace.';
    document.getElementById('end-btns').innerHTML=
      (isStarter?'<a class="by" href="/paiement?plan=annual" style="background:#111;color:#fff">Acc\u00e8s annuel &#8212; \u20ac49/an</a>':'')+
      '<a class="by" href="/challenges">Choisir mon prochain challenge</a>'+
      '<a class="bg2" href="/mon-espace" style="justify-content:center">Voir mon certificat</a>';
    document.getElementById('end-modal').classList.add('open');
  }else{
    toast('Jour '+_uc.current_day+' valid\u00e9\u00a0! S\u00e9rie\u00a0: '+newStreak+' jours \ud83d\udd25');
    setTimeout(function(){window.location.href='/dashboard';},1500);
  }
}

async function regenContent(){
  if(_uc.challenge_id==='boostme-starter')return; // Starter content is fixed
  await _sb.from('daily_content').delete().eq('user_id',_u.id).eq('challenge_id',_uc.challenge_id).eq('day_number',_uc.current_day);
  _c=null; await generateContent();
}

run();
</script>
</body>
</html>
