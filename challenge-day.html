<script>
var CHALLENGE_CONTENT = {
  "glow-up": [
    {
      day: 1,
      day_title: `L'état réel de ton image`,
      lesson_title: `L'état réel de ton image`,
      lesson_body: `L'image de soi est l'une des variables les plus documentées en psychologie sociale. Elle influence directement la confiance, les relations et même les performances professionnelles. La chercheuse Amy Cuddy (Harvard Business School) a montré que la façon dont on se présente physiquement modifie non seulement la perception des autres mais aussi la chimie hormonale de la personne elle-même. Avant de changer quoi que ce soit, il faut voir ce qui est réellement là — sans jugement, sans filtre, sans comparaison. La lucidité est le point de départ de toute transformation durable.`,
      action_title: `L'action du Jour 1`,
      action_body: `Prends 10 photos de toi aujourd'hui : de face, de profil, en tenue habituelle du matin, en tenue de travail, en tenue du soir. Ne filtre pas, ne repose pas. Regarde-les honnêtement. Note sur papier : ce que tu aimes, ce que tu veux changer, ce que tu as négligé. Ce document est ton point de départ — pas ton verdict.`,
      question: `Quand as-tu commencé à te mettre en dernier ? Quel événement ou quelle période a marqué ce tournant ?`,
      booster: `Je ne peux pas changer ce que je refuse de voir.`,
      alt_context: `— Contrainte émotionnelle (l'exercice fait mal) → L'IA valide que voir une image qu'on n'aime pas est difficile mais nécessaire. Elle recadre : ce n'est pas un jugement de valeur, c'est un point de départ. | — Contrainte de refus de se photographier → L'IA adapte : se regarder dans un miroir en pied pendant 3 minutes et noter les observations à l'oral sur mémo vocal.`,
    },
    {
      day: 2,
      day_title: `Ta routine beauté réelle`,
      lesson_title: `Ta routine beauté réelle`,
      lesson_body: `La peau est l'organe le plus visible du corps et l'un des plus révélateurs de l'état général de santé. Les dermatologues s'accordent sur trois piliers fondamentaux d'une peau en bonne santé : le nettoyage, l'hydratation et la protection solaire. Pourtant, selon une étude publiée dans le Journal of the American Academy of Dermatology, plus de 60 % des femmes n'ont pas de routine soin cohérente — non par manque de moyens mais par manque de priorité. Une routine de 5 minutes deux fois par jour suffit pour des résultats visibles en 30 jours. La régularité l'emporte toujours sur la sophistication.`,
      action_title: `L'action du Jour 2`,
      action_body: `Fais l'inventaire de ce que tu fais actuellement : est-ce que tu nettoies ton visage matin et soir ? Est-ce que tu hydrates ta peau ? Est-ce que tu protèges du soleil ? Note honnêtement ta routine actuelle — même si elle est inexistante. Tu n'as pas besoin de 10 produits. Identifie 3 gestes que tu t'engages à faire chaque jour pendant ce challenge.`,
      question: `Depuis combien de temps repousses-tu l'idée de prendre soin de toi ? Qu'est-ce qui te disait que ce n'était pas une priorité ?`,
      booster: `Prendre soin de moi n'est pas de la vanité. C'est du respect.`,
      alt_context: `— Contrainte de budget serré → L'IA propose une routine minimaliste à moins de 5 000 FCFA : savon doux, vaseline ou karité, crème solaire basique. | — Contrainte de peau sensible ou problématique → L'IA recommande de commencer uniquement par le nettoyage et l'hydratation, sans rien ajouter d'autre la première semaine.`,
    },
    {
      day: 3,
      day_title: `Ton rapport à ton corps`,
      lesson_title: `Ton rapport à ton corps`,
      lesson_body: `Le rapport au corps est l'un des sujets les plus complexes et les plus documentés en psychologie de la femme. La chercheuse Renee Engeln (Northwestern University) a étudié pendant plus de 15 ans le phénomène d'objectification — la tendance à regarder son propre corps comme un objet à juger plutôt qu'un instrument à habiter. Ses recherches montrent que les femmes passent en moyenne 1h30 par jour à penser à leur apparence physique de façon critique. Ce temps est une ressource qui peut être redirigée. Le Glow Up ne commence pas devant un miroir — il commence dans la façon dont tu parles de toi à toi-même.`,
      action_title: `L'action du Jour 3`,
      action_body: `Pendant toute la journée, note chaque pensée critique que tu formules sur ton corps. Pas pour te juger de les avoir — mais pour mesurer leur fréquence. Le soir, relis la liste. Pour chaque pensée critique, reformule-la en observation neutre ou en intention positive. "Mes bras sont gros" devient "Je veux renforcer mes bras" ou simplement "Mes bras me portent toute la journée."`,
      question: `Quel est le mot que tu utilises le plus souvent pour parler de ton corps ? Est-ce le mot que tu utiliserais pour parler du corps de ta meilleure amie ?`,
      booster: `Mon corps n'a pas besoin d'être parfait pour mériter d'être soigné.`,
      alt_context: `— Contrainte de discours intérieur très négatif → L'IA normalise : la majorité des femmes ont ce type de discours. Elle redirige sur la reformulation sans minimiser. | — Contrainte de refus de noter (trop douloureux) → L'IA adapte : faire l'exercice uniquement le soir, en listant de mémoire les 3 pensées les plus fréquentes de la journée.`,
    },
    {
      day: 4,
      day_title: `Ton sommeil, fondation invisible`,
      lesson_title: `Ton sommeil, fondation invisible`,
      lesson_body: `Le sommeil est la variable la plus sous-estimée de la beauté et de l'énergie. Le Dr Matthew Walker (UC Berkeley), auteur de "Why We Sleep", démontre que moins de 7 heures de sommeil par nuit affecte la régénération cellulaire, augmente le cortisol, réduit la production de collagène et altère l'expression du visage de façon mesurable. Une étude du Journal of Clinical Sleep Medicine a montré que des observateurs indépendants jugent systématiquement les personnes mal reposées comme moins attrayantes, moins saines et moins compétentes. Le meilleur sérum anti-âge existe déjà — il s'appelle le sommeil.`,
      action_title: `L'action du Jour 4`,
      action_body: `Note avec honnêteté : à quelle heure tu te couches en semaine, à quelle heure tu te lèves, combien de fois tu te réveilles la nuit. Calcule ton temps de sommeil réel. Est-ce que tu atteins 7 à 9 heures ? Identifie la principale chose qui retarde ton coucher. Cette semaine, couche-toi 30 minutes plus tôt que d'habitude — un seul changement, testable dès ce soir.`,
      question: `Qu'est-ce que tu fais systématiquement la nuit au lieu de dormir ? Est-ce que ça en vaut vraiment le coût sur ton énergie du lendemain ?`,
      booster: `Chaque nuit bien dormie est un investissement que je vois sur mon visage le matin.`,
      alt_context: `— Contrainte de bébé ou jeunes enfants (sommeil fragmenté) → L'IA reconnaît la contrainte et adapte : se concentrer sur la qualité plutôt que la quantité. Une sieste de 20 min peut compenser partiellement. | — Contrainte de travail de nuit → L'IA adapte l'objectif à la régularité du cycle disponible, quelle que soit l'heure.`,
    },
    {
      day: 5,
      day_title: `Ton énergie, ton carburant`,
      lesson_title: `Ton énergie, ton carburant`,
      lesson_body: `L'énergie physique est la ressource primaire de la beauté et de la présence. Une femme épuisée peut porter les plus beaux vêtements — on verra l'épuisement avant tout. La médecine fonctionnelle identifie quatre leviers d'énergie : le sommeil (traité hier), l'hydratation, l'alimentation et le mouvement. L'hydratation est le plus rapide à corriger avec des effets visibles immédiats : une étude publiée dans Skin Research and Technology montre qu'une hydratation correcte améliore l'élasticité cutanée et l'éclat en moins de 48 heures. L'objectif de ce challenge n'est pas un régime — c'est d'identifier ce qui te vide et ce qui te remplit.`,
      action_title: `L'action du Jour 5`,
      action_body: `Aujourd'hui, bois 2 litres d'eau — et note comment tu te sens à la fin de la journée comparé au matin. En parallèle, identifie par écrit : (1) les 3 aliments ou habitudes qui te donnent de l'énergie, (2) les 3 aliments ou habitudes qui te vident. Ce n'est pas un régime — c'est une cartographie.`,
      question: `À quel moment de la journée ton énergie est-elle la plus basse ? Est-ce que tu as identifié pourquoi ?`,
      booster: `Mon énergie est ma première ressource. Je choisis de la protéger.`,
      alt_context: `— Contrainte d'oubli de boire (pas l'habitude) → L'IA propose une alarme toutes les 2 heures ou d'associer l'eau à chaque repas et chaque pause. | — Contrainte de restriction alimentaire déjà en place → L'IA valide et se concentre uniquement sur l'hydratation et l'identification des sources d'énergie disponibles.`,
    },
    {
      day: 6,
      day_title: `Ta garde-robe, le message que tu envoies`,
      lesson_title: `Ta garde-robe, le message que tu envoies`,
      lesson_body: `Le style n'est pas une question de budget, de taille ou de tendances — c'est un langage. La chercheuse Karen Pine (University of Hertfordshire) a étudié l'effet des vêtements sur l'état d'esprit — ce qu'elle appelle l'"enclothed cognition". Ses recherches montrent que les vêtements portés influencent directement les performances cognitives et émotionnelles de celui qui les porte, pas seulement la perception des autres. En d'autres termes : quand tu t'habilles avec intention, tu penses et tu agis différemment. Ta garde-robe actuelle envoie un message — à toi d'abord, aux autres ensuite. Quel message envoie-t-elle ?`,
      action_title: `L'action du Jour 6`,
      action_body: `Ouvre ton armoire. Regarde honnêtement ce qu'il y a dedans. Identifie : (1) les 5 pièces dans lesquelles tu te sens la plus à l'aise et la plus toi-même, (2) les pièces que tu n'as pas portées depuis plus de 6 mois, (3) ce qui manque pour que tu te sentes bien habillée au quotidien. Tu n'achètes rien aujourd'hui — tu mappes.`,
      question: `La façon dont tu t'habilles aujourd'hui reflète-t-elle qui tu veux être — ou qui tu étais il y a 5 ans ?`,
      booster: `Je m'habille pour moi. Pas pour disparaître.`,
      alt_context: `— Contrainte de budget très serré → L'IA recadre sur l'utilisation de ce qui existe déjà différemment — nouvelle façon de porter les mêmes pièces. | — Contrainte de dress code professionnel strict → L'IA adapte le travail à l'espace disponible en dehors du travail.`,
    },
    {
      day: 7,
      day_title: `Bilan de semaine 1`,
      lesson_title: `Bilan de semaine 1`,
      lesson_body: `La recherche en psychologie comportementale montre que la réflexion hebdomadaire — prendre du recul sur ses observations et ses engagements — multiplie par 2,5 les chances de maintenir un changement de comportement sur 30 jours. Ce n'est pas accessoire. C'est une étape structurante. La Semaine 1 t'a donné une image honnête de où tu en es. C'est déjà un travail difficile — beaucoup de femmes ne se regardent jamais vraiment. Le fait d'être encore là au Jour 7 dit quelque chose sur toi.`,
      action_title: `L'action du Jour 7`,
      action_body: `Relis tes notes des 6 premiers jours. Réponds à ces 3 questions par écrit : (1) Quelle est la chose la plus importante que j'ai apprise sur moi cette semaine ? (2) Quel engagement ai-je tenu ? Quel engagement ai-je raté ? (3) Quelle est la décision concrète que je prends pour la semaine prochaine ?`,
      question: `Si tu devais retenir une seule chose de cette semaine, ce serait quoi ?`,
      booster: `Je ne transforme pas mon image en un jour. Mais chaque jour, je la transforme un peu.`,
      alt_context: `— Contrainte de n'avoir pas tenu les engagements → L'IA normalise : la semaine 1 est une observation, pas une performance. Ce qui compte est d'être honnête. | — Contrainte de découragement → L'IA recadre sur le fait d'avoir complété 7 jours comme preuve de sérieux.`,
    },
    {
      day: 8,
      day_title: `Installe ta routine soin matin`,
      lesson_title: `Installe ta routine soin matin`,

var STARTER_CONTENT=[{"day": 1, "phase": "Wake Up", "title": "Qui es-tu vraiment aujourd'hui ?", "lesson_title": "La conscience de soi comme levier de transformation", "lesson_body": "La plupart des transformations échouent non pas par manque de volonté, mais par manque de clarté sur le point de départ. Tasha Eurich, chercheuse en psychologie organisationnelle (2018), a montré dans une étude portant sur 5 000 personnes que seulement 10 à 15% des individus se voient réellement tels qu'ils sont. Les 85% restants fonctionnent avec une image floue ou biaisée d'eux-mêmes. Ce n'est pas un défaut de caractère — c'est un angle mort cognitif que tout le monde partage. Aujourd'hui, tu ne changes rien. Tu observes. Avec la même bienveillance que tu aurais pour quelqu'un que tu aimes profondément.", "action_title": "L'audit honnête en 3 dimensions", "action_body": "Prends 15 minutes seul(e), dans un endroit calme. Sur une feuille ou ton téléphone, note honnêtement : (1) Une chose que tu fais vraiment bien et que tu sous-estimes. (2) Une habitude qui te coûte de l'énergie chaque jour. (3) Une chose que tu repousses depuis trop longtemps. Pas de jugement — juste des faits. Ce sont tes données de départ.", "booster": "Je pars de là où je suis. C'est exactement le bon endroit.", "question": "Si tu devais décrire ta version idéale dans 6 mois en 3 mots, quels seraient-ils ?"}, {"day": 2, "phase": "Wake Up", "title": "Ton énergie est ta première ressource", "lesson_title": "La science du sommeil et de la performance personnelle", "lesson_body": "Le Dr Matthew Walker, neuroscientifique à l'Université de Californie Berkeley et auteur de Why We Sleep (2017), a démontré que le manque chronique de sommeil réduit les capacités cognitives, émotionnelles et physiques de façon mesurable — comparable à une ivresse légère. Plus frappant encore : une étude du Journal of Clinical Sleep Medicine (2021) prouve que la qualité du sommeil est le prédicteur numéro un de l'apparence perçue par les autres, avant le maquillage, les vêtements ou la coiffure. Ton énergie ne se construit pas dans une salle de sport. Elle se construit la nuit. Et tout le reste en dépend.", "action_title": "L'audit de ton sommeil des 7 derniers jours", "action_body": "10 minutes. Note pour chacun des 7 derniers jours : l'heure approximative de coucher, l'heure de réveil, et une note sur 10 de comment tu te sentais le matin. Un tableau simple — papier ou notes. À la fin, calcule ta moyenne de sommeil et ta moyenne d'énergie matinale. Ce tableau est ta baseline. Tu y reviendras au Jour 7.", "booster": "Mon énergie est ma première beauté. Je la protège.", "question": "À quoi sacrifies-tu ton sommeil ? Et est-ce que ça en vaut vraiment le prix ?"}, {"day": 3, "phase": "Wake Up", "title": "Ce que ton corps dit avant toi", "lesson_title": "La posture comme outil neurologique de confiance", "lesson_body": "Amy Cuddy, psychologue sociale à Harvard, a publié en 2010 une recherche qui a changé la façon dont on comprend le corps et la confiance : la posture physique influence directement les niveaux de cortisol (hormone du stress) et de testostérone en seulement 2 minutes. Mais au-delà de la chimie, la posture envoie un signal constant à ton propre cerveau : 'je suis en sécurité, je suis capable, j'ai ma place ici.' Ce signal change ta voix, ton regard, ta façon d'entrer dans une pièce — et donc la façon dont les autres te perçoivent. Ton corps parle avant que tu ouvres la bouche. Aujourd'hui, tu écoutes ce qu'il dit.", "action_title": "La vidéo de 30 secondes qui révèle tout", "action_body": "20 minutes. Filme-toi 30 secondes de dos puis de profil en marchant normalement dans une pièce. Regarde la vidéo sans te juger — observe uniquement : la position de tes épaules, l'alignement de ta tête, comment tes bras bougent. Note une seule chose à améliorer. Puis pratique 5 minutes : tiens-toi dos à un mur, talons, fessiers, épaules et nuque en contact. 3 fois 1 minute. Note comment tu te sens après.", "b rsité du Michigan et auteur de Chatter (2021), a démontré que la façon dont nous nous parlons intérieurement est le déterminant le plus puissant de notre résilience et de nos performances. Plus précisément, l'auto-dialogue à la deuxième ou troisième personne — 'tu peux le faire' ou 'elle est capable' — est significativement plus efficace que la première personne pour réguler les émotions sous pression. Ce n'est pas de l'affirmation positive naïve. C'est de la neurologie cognitive : la distance psychologique créée par le changement de personne active les circuits de régulation émotionnelle comme si tu conseillais un ami.", "action_title": "1 heure d'observation de ton discours intérieur", "action_body": "30 minutes étalées sur la journée. Pendant 1 heure aujourd'hui, observe ton discours intérieur comme un chercheur observerait un sujet. Chaque fois que tu te parles négativement — 'je suis nulle', 'ça ne marchera pas', 'je suis trop...' — note-le sur ton téléphone. Puis réécris chaque phrase à la deuxième personne, avec bienveillance et réalisme. Exemple : 'Tu traverses quelque chose de difficile. Et tu continues quand même.' En fin de journée, compte : combien de fois t'es-tu parlé négativement ? Le chiffre seul est déjà une révélation.", "booster": "Je suis mon alliée. D'abord et avant tout.", "question": "Si tu traitais tes amies comme tu te traites toi-même, les garderais-tu ?"}, {"day": 6, "phase": "Push", "title": "Fais une chose qui te fait peur", "lesson_title": "L'inconfort comme signal de croissance, pas de danger", "lesson_body": "Carol Dweck, professeure de psychologie à Stanford University, a développé dans ses recherches publiées depuis 2006 le concept de 'growth mindset' — l'état d'esprit de croissance. Son insight central : les personnes qui interprètent l'inconfort et la difficulté comme des signaux d'apprentissage plutôt que de danger développent une résilience, une créativité et des performances significativement supérieures sur le long terme. La z abitude que tu as installée. (3) Un moment dont tu es fier(ère). (4) Ce que tu vas continuer. (5) Ce que tu vas changer. Partage ce bilan — à une amie, dans un groupe, sur tes réseaux, ou dans un journal. L'acte d'écrire et de partager ancre la transformation.", "booster": "7 jours. Je me suis choisie. Je continue de me choisir.", "question": "Qu'est-ce que tu veux dire à la personne que tu étais il y a 7 jours ?"}];

var GROQ="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";
var _uc=null,_ch=null,_c=null;

async function run(){
  var u=await initUser();if(!u)return;
  // Load active challenge - simple
  var r=await _sb.from('user_challenges').select('*').eq('user_id',u.id).eq('status','active').order('last_active',{ascending:false}).limit(1).maybeSingle();
  if(!r.data){window.location.href='/challenges';return;}
  _uc=r.data; _ch=chById(r.data.challenge_id);
  renderHeader();

  await loadContent();
  renderValidation();
}

function renderHeader(){
  var pct=Math.min(100,Math.round((_uc.current_day-1)/_ch.dur*100));
  var weeks=Math.ceil(_uc.current_day/(_ch.dur/4));
  var phases=['Wake Up','Build','Push','Own It'];
  var phIco=['\u26a1','\ud83d\udd28','\ud83d\udd25','\ud83d\udc51'];
  var wk=Math.min(weeks-1,3);
  document.getElementById('hd-zone').innerHTML=
    '<div class="cd-header">'+
    '<div class="cd-lbl">'+_ch.ico+' '+_ch.name+'</div>'+
    '<div class="cd-title">Jour '+_uc.current_day+' sur '+_ch.dur+'</div>'+
    '<div class="cd-sub">'+_ch.cat+' &middot; S\u00e9rie\u00a0: '+(_uc.streak||0)+' jours</div>'+
    '<div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="prog-meta"><span>'+pct+'% compl\u00e9t\u00e9</span><span>S\u00b0'+(weeks)+'/4</span></div>'+
    '<span class="phase-badge">'+phIco[wk]+' S'+(weeks)+' \u2014 '+phases[wk]+'</span>'+
    '</div>';
}

function loadContent(){
  // Toujours charger depuis les fiches preparees — jamais depuis le cache Supabase
  generateContent();
}

function generateContent(){
  // Charger le contenu depuis les fiches preparees — aucun appel IA
  var chId = _uc.challenge_id;
  var dayNum = _uc.current_day;
  var chData = CHALLENGE_CONTENT[chId];
  if(!chData){
    document.getElementById('content-zone').innerHTML='<div class="loading-zone" style="background:#FEF3C7">Challenge introuvable : '+chId+'</div>';
    return;
  }
  var dayData = chData.find(function(d){ return d.day === dayNum; });
  if(!dayData){
    // Fallback sur le dernier jour disponible
    dayData = chData[chData.length - 1];
  }
  _c = dayData;
  renderContent(dayData);
}

function renderContent(c){
  var prenom=(_p&&_p.prenom)?', '+_p.prenom:'';
  document.getElementById('content-zone').innerHTML=
    '<div style="margin-bottom:.85rem">'
    +'<div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#bbb;margin-bottom:.25rem">Jour '+_uc.current_day+'</div>'
    +'<div style="font-size:1.15rem;font-weight:900;color:#111;line-height:1.25">'+(c.day_title||c.title||('Jour '+(_uc?_uc.current_day:'')))+' </div></div>'
    +'<div class="card"><div class="sec-label sl-l">&#128214; La le\u00e7on du jour</div>'
    +'<h3>'+c.lesson_title+'</h3><p>'+c.lesson_body+'</p></div>'
    +'<div class="card" id="action-section">'
    +'<div class="sec-label sl-a">&#9889; L\'action du jour</div>'
    +'<h3>'+c.action_title+'</h3><p>'+c.action_body+'</p>'
    +'<button class="alt-btn" onclick="openAlt()">&#128260; Cette action ne m\'est pas possible aujourd\'hui &rarr; L\'IA adapte</button>'
    +'<div id="alt-result"></div></div>'
    +'<div class="booster-card"><div class="bl">&#128293; Le Booster</div>'
    +'<p>\u201c'+(c.booster||c.mantra||'Continue. Tu es plus proche que tu ne le crois.')+' \u201d</p></div>'
    +'<div class="card"><div class="sec-label sl-q">&#127891; Question du soir</div>'
    +'<p style="font-style:italic;font-size:.9rem;color:#333;line-height:1.65">'+c.question+'</p></div>'
    +'<button class="bg2" onclick="regenContent()" style="width:100%;justify-content:center;margin-bottom:.5rem">&#8635; R\u00e9g\u00e9n\u00e9rer</button>';
}

function openAlt(){document.getElementById('alt-modal').classList.add('open');}
function closeAlt(){document.getElementById('alt-modal').classList.remove('open');}

async function genAlt(){
  var constraint=document.getElementById('alt-input').value.trim();
  if(!constraint){toast('D\u00e9cris ta contrainte pour adapter l\'action.');return;}
  var btn=document.getElementById('alt-btn');btn.textContent='\u23f3 G\u00e9n\u00e9ration...';btn.disabled=true;
  var obj=(_c&&_c.action_objective)||('objectif du jour '+_uc.current_day+' du challenge '+_ch.name);
  var prompt='Coach expert. Contrainte: "'+constraint+'". Objectif p\u00e9dagogique immuable: '+obj+'. G\u00e9n\u00e8re une action alternative qui respecte le m\u00eame objectif et s\'adapte \u00e0 la contrainte. JSON: {"alt_title":"...","alt_body":"description 60-80 mots","encouragement":"phrase courte motivante max 20 mots"}';
  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:400,temperature:0.8})});
    var d=await resp.json();
    var raw=d.choices[0].message.content.trim();
    var m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    var alt=JSON.parse(m[0]);
    closeAlt();
    document.getElementById('alt-result').innerHTML='<div style="background:#F0FDF4;border-radius:10px;padding:.9rem 1rem;margin-top:.85rem;border:1.5px solid #22C55E">'
      +'<div style="font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#22C55E;margin-bottom:.4rem">&#10003; Action adapt\u00e9e</div>'
      +'<div style="font-size:.88rem;font-weight:700;margin-bottom:.3rem">'+alt.alt_title+'</div>'
      +'<p style="font-size:.8rem;color:#444;line-height:1.65">'+alt.alt_body+'</p>'
      +'<p style="font-size:.76rem;color:#22C55E;font-style:italic;margin-top:.4rem;font-weight:600">'+alt.encouragement+'</p></div>';
    document.getElementById('alt-input').value='';
  }catch(e){toast('Erreur. R\u00e9essaie.');}
  btn.textContent='\u26a1 G\u00e9n\u00e9rer l\'alternative';btn.disabled=false;
}

function renderValidation(){
  document.getElementById('val-zone').innerHTML=
    '<div class="val-section"><h4>&#10003; Valider le Jour '+_uc.current_day+'</h4>'
    +'<textarea id="ref-txt" placeholder="Ta r\u00e9flexion du jour \u2014 optionnel\u2026"></textarea>'
    +'<button class="by" onclick="validateDay()" style="width:100%;margin-top:.75rem">Marquer comme fait \u2192</button></div>'
    +'<a class="bg2" href="/dashboard" style="width:100%;justify-content:center;margin-bottom:1rem">\u2190 Tableau de bord</a>';
}

async function validateDay(){
  var refVal=document.getElementById('ref-txt')?document.getElementById('ref-txt').value.trim():'';
  await _sb.from('daily_validations').upsert({user_id:_u.id,challenge_id:_uc.challenge_id,day_number:_uc.current_day,reflection:refVal,validated_at:new Date().toISOString()},{onConflict:'user_id,challenge_id,day_number'});
  var newDay=_uc.current_day+1,newStreak=(_uc.streak||0)+1,done=newDay>_ch.dur;
  await _sb.from('user_challenges').update({current_day:newDay,streak:newStreak,last_active:new Date().toISOString(),status:done?'completed':'active',completed_at:done?new Date().toISOString():null}).eq('id',_uc.id);
  if(done){
    var certNum='BM-'+Date.now().toString(36).toUpperCase();
    await _sb.from('certificats').upsert({user_id:_u.id,challenge_id:_uc.challenge_id,challenge_name:_ch.name,days_completed:_ch.dur,final_streak:newStreak,completed_at:new Date().toISOString(),cert_number:certNum},{onConflict:'user_id,challenge_id'});
    var isStarter=_uc.challenge_id==='boostme-starter';
    document.getElementById('end-ico').textContent=isStarter?'\ud83c\udf89':'\ud83c\udfc6';
    document.getElementById('end-title').textContent=isStarter?'Starter termin\u00e9\u00a0!':'Challenge termin\u00e9\u00a0!';
    document.getElementById('end-msg').textContent=isStarter?'Tu as fait les 7 jours\u00a0! Ton certificat est dans Mon Espace. Choisis ton prochain challenge ou passe au plan annuel pour tout d\u00e9bloquer.':'F\u00e9licitations\u00a0! '+_ch.dur+' jours boulis. Ton certificat est dans Mon Espace.';
    document.getElementById('end-btns').innerHTML=
      (isStarter?'<a class="by" href="/paiement?plan=annual" style="background:#111;color:#fff">Acc\u00e8s annuel &#8212; \u20ac49/an</a>':'')+
      '<a class="by" href="/challenges">Choisir mon prochain challenge</a>'+
      '<a class="bg2" href="/mon-espace" style="justify-content:center">Voir mon certificat</a>';
    document.getElementById('end-modal').classList.add('open');
  }else{
    toast('Jour '+_uc.current_day+' valid\u00e9\u00a0! S\u00e9rie\u00a0: '+newStreak+' jours \ud83d\udd25');
    setTimeout(function(){window.location.href='/dashboard';},1500);
  }
}

async function regenContent(){
  if(_uc.challenge_id==='boostme-starter')return; // Starter content is fixed
  await _sb.from('daily_content').delete().eq('user_id',_u.id).eq('challenge_id',_uc.challenge_id).eq('day_number',_uc.current_day);
  _c=null; await generateContent();
}

run();
</script>
</body>
</html>
