<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Challenges — BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:70px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.nav img{height:30px}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nav-name{font-size:.8rem;font-weight:600;color:#333}
.nav-plan{background:#FFF8E1;color:#E5AC00;font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:4px}
.btn-out{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem Poppins,sans-serif;cursor:pointer;color:#666}
.btn-out:hover{border-color:#111;color:#111}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(5,1fr);height:58px;z-index:100}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:Poppins,sans-serif;cursor:pointer}
.bn.on,.bn:hover{color:#FFC107}
.bn-ico{font-size:1.1rem;line-height:1}
.page{margin-top:60px;padding:1.5rem 1.25rem;max-width:860px;margin-left:auto;margin-right:auto}
.btn-y{display:inline-flex;align-items:center;justify-content:center;padding:.78rem 1.4rem;background:#FFC107;color:#111;font:700 .86rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-y:hover{background:#E5AC00}
.btn-ghost{display:inline-flex;align-items:center;padding:.65rem 1.1rem;background:none;color:#666;font:600 .8rem Poppins,sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-ghost:hover{border-color:#111;color:#111}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.pg-title{font-size:1.2rem;font-weight:900;margin-bottom:.25rem}
.pg-sub{font-size:.8rem;color:#666;margin-bottom:1.25rem}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem}
.fb{padding:.38rem .85rem;border:1.5px solid #E2E2E2;border-radius:50px;font:600 .74rem Poppins,sans-serif;cursor:pointer;background:#fff;color:#666;transition:all .15s}
.fb.on{background:#111;color:#fff;border-color:#111}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.ch-card{background:#fff;border-radius:14px;padding:1.1rem;border:1px solid #E2E2E2;transition:all .2s;cursor:pointer}
.ch-card:hover{border-color:#FFC107;transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,193,7,.1)}
.ch-card.active{border-color:#22C55E;border-width:2px;background:#F0FDF4}
.ch-card.locked{opacity:.7}
.ch-ico{font-size:2rem;margin-bottom:.55rem;display:block}
.ch-name{font-size:.88rem;font-weight:800;margin-bottom:.15rem}
.ch-cat{font-size:.67rem;color:#999;margin-bottom:.5rem}
.ch-tag{font-size:.65rem;margin-bottom:.55rem;display:block}
.ch-tagline{font-size:.76rem;color:#555;line-height:1.5;margin-bottom:.75rem}
.ch-foot{display:flex;align-items:center;justify-content:space-between}
.ch-days{font-size:.67rem;font-weight:700;color:#999}
.ch-price{font-size:.78rem;font-weight:800}
@media(max-width:480px){.ch-grid{grid-template-columns:1fr}}
</style>
</head>

var _sb = window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');
var _user=null,_profile=null;
var _tt;
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show')},3000);}
function doLogout(){_sb.auth.signOut().then(function(){window.location.href='/';});}
async function loadUser(){
  var r=await _sb.auth.getSession();
  if(!r.data.session){window.location.href='/login';return false;}
  _user=r.data.session.user;
  var pr=await _sb.from('profiles').select('*').eq('id',_user.id).single();
  _profile=pr.data||{};
  var n=document.getElementById('nav-name');if(n)n.textContent=_profile.prenom||'';
  var pl=document.getElementById('nav-plan');
  if(pl){var lb={free:'Starter',unit:'Challenge',annual:'Annuel',pending:'En attente'};pl.textContent=lb[_profile.plan]||'Starter';}
  return true;
}
var _activeId=null;
var _cat='all';

async function run(){
  var ok=await loadUser();if(!ok)return;
  var ac=await _sb.from('user_challenges').select('challenge_id').eq('user_id',_user.id).eq('status','active').maybeSingle();
  _activeId=ac.data?ac.data.challenge_id:null;
  render();
}

function filter(btn,cat){
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  _cat=cat;
  render();
}

function render(){
  var list=_cat==='all'?ALL_CHALLENGES:ALL_CHALLENGES.filter(function(c){return c.category===_cat;});
  var html='';
  list.forEach(function(ch){
    var isActive=ch.id===_activeId;
    var canAccess=ch.free||(_profile&&_profile.plan==='annual');
    var priceLabel=ch.free?'<span style="color:#22C55E;font-weight:800">Gratuit</span>':canAccess?'<span style="color:#22C55E">Inclus</span>':'<span style="color:#111">€'+ch.price+'/challenge</span>';
    var badge=isActive?'<span style="background:#D1FAE5;color:#065F46;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:800">EN COURS</span>':
              ch.free?'<span style="background:#FFF8E1;color:#E5AC00;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:800">GRATUIT</span>':
              canAccess?'<span style="background:#DBEAFE;color:#1E40AF;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:800">INCLUS</span>':
              '<span style="background:#F0F0F0;color:#666;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:800">&#128274;</span>';
    html+='<div class="ch-card'+(isActive?' active':'')+((!canAccess&&!ch.free&&!isActive)?' locked':'')+'" onclick="startCh(''+ch.id+'','+isActive+','+canAccess+')">'+
      '<span class="ch-ico">'+ch.emoji+'</span>'+
      '<div class="ch-name">'+ch.name+'</div>'+
      '<div class="ch-cat">'+ch.category+'</div>'+
      '<span class="ch-tag">'+badge+'</span>'+
      '<div class="ch-tagline">'+ch.tagline+'</div>'+
      '<div class="ch-foot"><span class="ch-days">'+ch.duration+' jours</span>'+priceLabel+'</div>'+
      '</div>';
  });
  document.getElementById('ch-grid').innerHTML=html||'<p style="color:#999;font-size:.84rem;grid-column:1/-1">Aucun challenge dans cette catégorie.</p>';
}

async function startCh(id,isActive,canAccess){
  if(isActive){window.location.href='/challenge-day';return;}
  if(!canAccess){toast('Passe au plan annuel pour accéder à ce challenge');setTimeout(function(){window.location.href='/tarifs';},2000);return;}
  if(_activeId&&_activeId!==id){if(!confirm('Tu as déjà un challenge en cours. Veux-tu en démarrer un nouveau ?'))return;}
  toast('Démarrage...');
  await _sb.from('user_challenges').upsert({user_id:_user.id,challenge_id:id,current_day:1,status:'active',streak:0,last_active:new Date().toISOString()});
  window.location.href='/dashboard';
}

run();
