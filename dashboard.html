<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon espace — BOOST.ME</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:64px;display:flex;align-items:center;padding:0 1.5rem;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.nav-logo img{height:32px}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nav-name{font-size:.82rem;font-weight:600;color:#333}
.nav-plan{background:#FFF8E1;color:#E5AC00;font-size:.65rem;font-weight:800;padding:.18rem .55rem;border-radius:4px;text-transform:uppercase}
.btn-logout{padding:.45rem 1rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .78rem/1 'Poppins',sans-serif;cursor:pointer;color:#666;transition:all .15s}
.btn-logout:hover{border-color:#111;color:#111}
/* LAYOUT */
.page{margin-top:64px;padding:2rem 1.5rem;max-width:900px;margin-left:auto;margin-right:auto}
/* GREETING */
.greeting{margin-bottom:2rem}
.greeting h1{font-size:1.6rem;font-weight:900;margin-bottom:.2rem}
.greeting h1 em{color:#FFC107;font-style:normal}
.greeting .date{font-size:.82rem;color:#999}
/* CHALLENGE CARD */
.challenge-card{background:#111;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.challenge-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,193,7,.12),transparent 65%)}
.ch-label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,193,7,.6);margin-bottom:.6rem}
.ch-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.35rem}
.ch-sub{font-size:.8rem;color:rgba(255,255,255,.45);margin-bottom:1.25rem}
.ch-progress{background:rgba(255,255,255,.1);border-radius:50px;height:6px;margin-bottom:.5rem;overflow:hidden}
.ch-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,#FFC107,#E5AC00);transition:width .5s}
.ch-meta{display:flex;justify-content:space-between;font-size:.72rem;color:rgba(255,255,255,.4)}
.btn-continue{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.1rem;padding:.75rem 1.5rem;background:#FFC107;color:#111;font:700 .88rem/1 'Poppins',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s}
.btn-continue:hover{background:#E5AC00;transform:translateY(-1px)}
/* CONTENT OF THE DAY */
.today-title{font-size:1rem;font-weight:800;margin-bottom:1rem}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.content-card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid #E2E2E2}
.cc-type{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:.6rem}
.cc-type.lesson{color:#FFC107}
.cc-type.action{color:#22C55E}
.cc-type.question{color:#6366F1}
.cc-body h3{font-size:.92rem;font-weight:700;margin-bottom:.4rem}
.cc-body p{font-size:.82rem;color:#555;line-height:1.65}
.cc-full{grid-column:1/-1}
.btn-regen{display:flex;align-items:center;gap:.3rem;margin-top:.85rem;padding:.45rem .9rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem/1 'Poppins',sans-serif;cursor:pointer;color:#666;transition:all .15s}
.btn-regen:hover{border-color:#FFC107;color:#E5AC00}
/* NO CHALLENGE */
.empty{background:#fff;border-radius:16px;padding:2.5rem;text-align:center;margin-bottom:1.5rem}
.empty h2{font-size:1.1rem;font-weight:800;margin-bottom:.5rem}
.empty p{font-size:.85rem;color:#666;margin-bottom:1.5rem}
.btn-start{display:inline-flex;padding:.85rem 2rem;background:#FFC107;color:#111;font:700 .9rem/1 'Poppins',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-start:hover{background:#E5AC00}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(5,1fr);height:60px}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.6rem;font-weight:600;color:#999;cursor:pointer;text-decoration:none;transition:color .15s}
.bn.active,.bn:hover{color:#FFC107}
.bn span{font-size:1.1rem}
/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;min-height:200px;font-size:.88rem;color:#999}
/* AI generating */
.ai-loading{display:flex;align-items:center;gap:.6rem;padding:1rem;background:#FFFAEC;border-radius:10px;font-size:.82rem;color:#666;border:1px solid rgba(255,193,7,.2)}
.spinner{width:16px;height:16px;border:2px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.65rem 1rem;border-radius:10px;font-size:.75rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
body{padding-bottom:70px}
@media(max-width:600px){.content-grid{grid-template-columns:1fr}.cc-full{grid-column:1}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb = window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');
var GROQ_KEY = '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';

var _t;
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_t);_t=setTimeout(function(){e.classList.remove('show')},3000);}

// Set date
var d=new Date();
var days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var months=['janvier','f\u00e9vrier','mars','avril','mai','juin','juillet','ao\u00fbt','septembre','octobre','novembre','d\u00e9cembre'];
document.getElementById('today-date').textContent=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();

var currentUser=null, currentProfile=null, currentChallenge=null;

async function init(){
  var r=await sb.auth.getSession();
  if(!r.data.session){window.location.href='/login';return;}
  currentUser=r.data.session.user;

  // Load profile
  var pr=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  currentProfile=pr.data;
  if(currentProfile){
    document.getElementById('user-name').textContent=currentProfile.prenom||'Membre';
    document.getElementById('nav-name').textContent=currentProfile.prenom||'';
    var planLabels={free:'Starter',unit:'Challenge',annual:'Annuel',pending:'En attente'};
    document.getElementById('nav-plan').textContent=planLabels[currentProfile.plan]||'Starter';
  }

  // Load active challenge
  var cr=await sb.from('user_challenges')
    .select('*, challenges(name,emoji,category,duration)')
    .eq('user_id',currentUser.id)
    .eq('status','active')
    .limit(1)
    .single();

  if(cr.data){
    currentChallenge=cr.data;
    renderChallenge(cr.data);
  } else {
    renderEmpty();
  }
}

function renderEmpty(){
  document.getElementById('main-content').innerHTML=
    '<div class="empty">'+
    '<div style="font-size:2.5rem;margin-bottom:.75rem">&#127919;</div>'+
    '<h2>Commence ton premier challenge !</h2>'+
    '<p>Choisis un challenge et commence ta transformation aujourd\u2019hui.</p>'+
    '<a class="btn-start" href="/challenges">Voir les challenges</a>'+
    '</div>';
}

function renderChallenge(uc){
  var ch=uc.challenges;
  var pct=Math.round((uc.current_day-1)/ch.duration*100);
  var html=
    '<div class="challenge-card">'+
    '<div class="ch-label">&#127919; Challenge en cours</div>'+
    '<div class="ch-title">'+ch.emoji+' '+ch.name+'</div>'+
    '<div class="ch-sub">Jour '+uc.current_day+' sur '+ch.duration+' &middot; '+ch.category+'</div>'+
    '<div class="ch-progress"><div class="ch-bar" style="width:'+pct+'%"></div></div>'+
    '<div class="ch-meta"><span>'+pct+'% compl\u00e9t\u00e9</span><span>S\u00e9rie : '+uc.streak+' jours</span></div>'+
    '<button class="btn-continue" onclick="goToDay()">Continuer le challenge &#8594;</button>'+
    '</div>'+
    '<div class="today-title">&#10024; Contenu du jour — Jour '+uc.current_day+'</div>'+
    '<div id="ai-content"><div class="ai-loading"><div class="spinner"></div>L\u2019IA g\u00e9n\u00e8re ton contenu personnalis\u00e9...</div></div>';
  document.getElementById('main-content').innerHTML=html;
  generateDailyContent(uc);
}

function goToDay(){window.location.href='/challenge-day';}

async function generateDailyContent(uc){
  var ch=uc.challenges;
  var profile=currentProfile;

  // Check if content already exists for today
  var today=new Date().toISOString().split('T')[0];
  var existing=await sb.from('daily_content')
    .select('*')
    .eq('user_id',currentUser.id)
    .eq('challenge_id',uc.challenge_id)
    .eq('day_number',uc.current_day)
    .single();

  if(existing.data){
    renderContent(existing.data);
    return;
  }

  // Generate with Groq
  var prompt='Tu es un coach expert en d\u00e9veloppement personnel. G\u00e9n\u00e8re le contenu pour le Jour '+uc.current_day+' du challenge "'+ch.name+'" pour '+profile.prenom+', '+profile.age_range+' ans, '+profile.situation_pro+', objectif : '+profile.objectif+'. R\u00e9ponds UNIQUEMENT en JSON avec ce format exact : {"lesson_title":"...","lesson_body":"...","action_title":"...","action_body":"...","question":"..."}. En fran\u00e7ais. Contenu concret, actionnable, adapt\u00e9 \u00e0 son profil.';

  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[{role:'user',content:prompt}],
        max_tokens:800,
        temperature:0.8
      })
    });
    var data=await resp.json();
    var raw=data.choices[0].message.content;
    // Extract JSON
    var match=raw.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('No JSON');
    var content=JSON.parse(match[0]);

    // Save to DB
    await sb.from('daily_content').upsert({
      user_id:currentUser.id,
      challenge_id:uc.challenge_id,
      day_number:uc.current_day,
      lesson_title:content.lesson_title,
      lesson_body:content.lesson_body,
      action_title:content.action_title,
      action_body:content.action_body,
      question:content.question
    });

    renderContent(content);
  } catch(e){
    document.getElementById('ai-content').innerHTML=
      '<div class="ai-loading">&#9888;&#65039; Contenu temporairement indisponible. <button onclick="generateDailyContent(currentChallenge)" style="margin-left:.5rem;background:none;border:none;color:#E5AC00;font-weight:700;cursor:pointer;font-family:inherit">R\u00e9essayer</button></div>';
  }
}

function renderContent(c){
  document.getElementById('ai-content').innerHTML=
    '<div class="content-grid">'+
    '<div class="content-card">'+
    '<div class="cc-type lesson">&#128214; Le\u00e7on du jour</div>'+
    '<div class="cc-body"><h3>'+c.lesson_title+'</h3><p>'+c.lesson_body+'</p></div>'+
    '</div>'+
    '<div class="content-card">'+
    '<div class="cc-type action">&#9889; Action du jour</div>'+
    '<div class="cc-body"><h3>'+c.action_title+'</h3><p>'+c.action_body+'</p></div>'+
    '</div>'+
    '<div class="content-card cc-full">'+
    '<div class="cc-type question">&#128161; Question du soir</div>'+
    '<div class="cc-body"><p style="font-size:.95rem;font-style:italic;color:#333">'+c.question+'</p></div>'+
    '<button class="btn-regen" onclick="regenContent()">&#8635; R\u00e9g\u00e9n\u00e9rer</button>'+
    '</div>'+
    '</div>';
}

async function regenContent(){
  if(!currentChallenge)return;
  // Delete existing and regenerate
  await sb.from('daily_content')
    .delete()
    .eq('user_id',currentUser.id)
    .eq('challenge_id',currentChallenge.challenge_id)
    .eq('day_number',currentChallenge.current_day);
  document.getElementById('ai-content').innerHTML='<div class="ai-loading"><div class="spinner"></div>G\u00e9n\u00e9ration en cours...</div>';
  generateDailyContent(currentChallenge);
}

function doLogout(){
  sb.auth.signOut().then(function(){window.location.href='/';});
}

init();
</script>
