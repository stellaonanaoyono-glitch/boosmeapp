@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.dgreet h1{font-size:1.5rem;font-weight:900;margin-bottom:.15rem}

.dt{font-size:.78rem;color:#999;margin-bottom:1.5rem}

.dash-ch::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,193,7,.08),transparent 65%);pointer-events:none}
.dch-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,193,7,.65);margin-bottom:.5rem}
.dch-title{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.dch-sub{font-size:.77rem;color:rgba(255,255,255,.42);margin-bottom:1rem}
.prog-bg{background:rgba(255,255,255,.1);border-radius:50px;height:5px;overflow:hidden;margin-bottom:.4rem}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#FFC107,#E5AC00);transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:.7rem;color:rgba(255,255,255,.35)}

<div class="toast" id="toast"></div>
<script>var _sb=window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');
var _u=null,_p=null,_tt;
function toast(m){var e=document.getElementById('toast');if(!e)return;e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){e.classList.remove('show')},3000);}
function doLogout(){_sb.auth.signOut().then(function(){window.location.href='/';});}
async function initUser(){
  var r=await _sb.auth.getSession();
  if(!r.data.session){window.location.href='/login';return null;}
  _u=r.data.session.user;
  var pr=await _sb.from('profiles').select('*').eq('id',_u.id).single();
  _p=pr.data||{};
  var n=document.getElementById('nav-nm');if(n)n.textContent=_p.prenom||'';
  var pl=document.getElementById('nav-pl');
  if(pl){var lb={free:'Starter',unit:'Challenge',annual:'Annuel',pending:'En attente'};
  pl.textContent=lb[(_p&&_p.plan)||'free']||'Starter';}
  return _u;
}
var GROQ="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";
var ALL_CH=[
  {id:"boostme-starter",name:"BoostMe Starter",cat:"Multi-piliers",ico:"&#9889;",tag:"7 jours pour découvrir ta meilleure version.",dur:7,price:0,free:true},
  {id:"cash-clarity",name:"Cash Clarity",cat:"Money",ico:"&#128176;",tag:"Reprends le contrôle de ton argent.",dur:30,price:3.99,free:false},
  {id:"glow-up",name:"Glow Up",cat:"Mind",ico:"&#10024;",tag:"Deviens la femme que tu regardes de loin.",dur:30,price:3.99,free:false},
  {id:"mental-detox",name:"Mental Detox",cat:"Mind",ico:"&#129504;",tag:"Libère ton esprit et retrouve ta clarté.",dur:30,price:3.99,free:false},
  {id:"morning-power",name:"Morning Power",cat:"Performance",ico:"&#127749;",tag:"Possède tes matins, possède ta vie.",dur:30,price:3.99,free:false},
  {id:"unshakeable-confidence",name:"Unshakeable Confidence",cat:"Mind",ico:"&#128170;",tag:"La confiance se construit, pas se cherche.",dur:30,price:3.99,free:false},
  {id:"body-reset",name:"Body Reset",cat:"Performance",ico:"&#128154;",tag:"Ton corps est ton premier outil de performance.",dur:30,price:3.99,free:false},
  {id:"build-your-brand",name:"Build Your Brand",cat:"Carrière",ico:"&#128640;",tag:"Tu existes déjà. Le monde doit le savoir.",dur:30,price:3.99,free:false},
  {id:"side-hustle-starter",name:"Side Hustle Starter",cat:"Money",ico:"&#128161;",tag:"Lance ton activité secondaire.",dur:30,price:3.99,free:false},
  {id:"own-the-room",name:"Own The Room",cat:"Carrière",ico:"&#127908;",tag:"Prendre la parole avec impact.",dur:30,price:3.99,free:false},
  {id:"deep-work-mode",name:"Deep Work Mode",cat:"Performance",ico:"&#127919;",tag:"Produis 3x plus en moins de temps.",dur:30,price:3.99,free:false},
  {id:"network-like-a-pro",name:"Network Like a Pro",cat:"Carrière",ico:"&#129309;",tag:"Ton réseau est ton tremplin.",dur:30,price:3.99,free:false},
  {id:"read-and-lead",name:"Read & Lead",cat:"Performance",ico:"&#128214;",tag:"Tu lis pour changer, pas pour savoir.",dur:30,price:3.99,free:false},
]; function chById(id){return ALL_CH.find(function(x){return x.id===id;})||ALL_CH[0];}
var _uc=null;

(function(){var d=new Date(),days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],months=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];document.getElementById('dt').textContent=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();})();

async function run(){
  var u=await initUser();if(!u)return;
  document.getElementById('uname').textContent=_p.prenom||'Membre';
  
  var r=await _sb.from('user_challenges').select('*').eq('user_id',u.id).eq('status','active').order('last_active',{ascending:false}).limit(1).maybeSingle();
  
  if(r.error||!r.data){
    // Auto-start Starter for new users
    await _sb.from('user_challenges').upsert({user_id:u.id,challenge_id:'boostme-starter',current_day:1,status:'active',streak:0,last_active:new Date().toISOString()},{onConflict:'user_id,challenge_id'});
    var fr=await _sb.from('user_challenges').select('*').eq('user_id',u.id).eq('challenge_id','boostme-starter').single();
    _uc=fr.data||{challenge_id:'boostme-starter',current_day:1,streak:0};
  } else {
    _uc=r.data;
  }
  
  var ch=chById(_uc.challenge_id);
  var pct=Math.min(100,Math.round((_uc.current_day-1)/ch.dur*100));
  
  document.getElementById('ch-zone').innerHTML=
    '<div class="dash-ch">'+
    '<div class="dch-lbl">&#127919; Challenge en cours</div>'+
    '<div class="dch-title">'+ch.ico+' '+ch.name+'</div>'+
    '<div class="dch-sub">Jour '+_uc.current_day+' sur '+ch.dur+' &middot; '+ch.cat+'</div>'+
    '<div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="prog-meta"><span>'+pct+'% complété</span><span>Série : '+(_uc.streak||0)+' jours</span></div>'+
    '<a class="by" href="/challenge-day" style="margin-top:1rem;display:inline-flex">Continuer &#8212; Jour '+_uc.current_day+' &#8594;</a>'+
    '</div>'+
    '<div style="font-size:.9rem;font-weight:800;margin:.25rem 0 .85rem">&#10024; Contenu du jour</div>'+
    '<div id="ai-zone"><div style="display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;background:#FFFAEC;border-radius:10px;font-size:.8rem;color:#666;border:1px solid rgba(255,193,7,.2)"><div class="spin"></div>Génération en cours&#8230;</div></div>';
  
  genContent(_uc, ch);
}

async function genContent(uc, ch){
  var ex=await _sb.from('daily_content').select('*').eq('user_id',_u.id).eq('challenge_id',uc.challenge_id).eq('day_number',uc.current_day).maybeSingle();
  if(ex.data){renderAI(ex.data);return;}
  
  var prompt='Coach expert. Jour '+uc.current_day+'/'+ch.dur+' du challenge "'+ch.name+'" ('+ch.cat+'). Utilisateur: '+(_p.prenom||'')+('. Objectif: '+ch.tag)+'. JSON UNIQUEMENT sans markdown: {"lesson_title":"...","lesson_body":"3 phrases max","action_title":"...","action_body":"2 phrases action concrète","question":"question réflexion du soir"}';
  
  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:450,temperature:0.8})
    });
    var d=await resp.json();
    if(!d.choices||!d.choices[0])throw new Error('no response');
    var raw=d.choices[0].message.content.trim();
    var m=raw.match(/\{[\s\S]*?\}/);
    if(!m)throw new Error('no json');
    var c=JSON.parse(m[0]);
    await _sb.from('daily_content').upsert({user_id:_u.id,challenge_id:uc.challenge_id,day_number:uc.current_day,lesson_title:c.lesson_title,lesson_body:c.lesson_body,action_title:c.action_title,action_body:c.action_body,question:c.question});
    renderAI(c);
  }catch(e){
    document.getElementById('ai-zone').innerHTML='<div style="padding:.9rem 1rem;background:#FEF3C7;border-radius:10px;font-size:.8rem;color:#666">Contenu temporairement indisponible. <button onclick="genContent(_uc,chById(_uc.challenge_id))" style="background:none;border:none;color:#E5AC00;font-weight:700;cursor:pointer;font-family:inherit">Réessayer</button></div>';
  }
}

function renderAI(c){
  document.getElementById('ai-zone').innerHTML=
    '<div style="background:#fff;border-radius:12px;padding:1.1rem;border:1px solid #E2E2E2;margin-bottom:.85rem">'+
    '<div style="font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#FFC107;margin-bottom:.55rem">Leçon du jour</div>'+
    '<h3 style="font-size:.88rem;font-weight:700;margin-bottom:.35rem;line-height:1.35">'+c.lesson_title+'</h3>'+
    '<p style="font-size:.8rem;color:#555;line-height:1.6">'+c.lesson_body+'</p></div>'+
    '<div style="background:#fff;border-radius:12px;padding:1.1rem;border:1px solid #E2E2E2;margin-bottom:.85rem">'+
    '<div style="font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#22C55E;margin-bottom:.55rem">Action du jour</div>'+
    '<h3 style="font-size:.88rem;font-weight:700;margin-bottom:.35rem;line-height:1.35">'+c.action_title+'</h3>'+
    '<p style="font-size:.8rem;color:#555;line-height:1.6">'+c.action_body+'</p></div>'+
    '<div style="background:#fff;border-radius:12px;padding:1.1rem;border:1px solid #E2E2E2">'+
    '<div style="font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#6366F1;margin-bottom:.55rem">Question du soir</div>'+
    '<p style="font-size:.88rem;color:#333;font-style:italic;line-height:1.6">'+c.question+'</p>'+
    '<button class="bg" onclick="regen()" style="margin-top:.85rem;font-size:.75rem">&#8635; Régénérer</button></div>';
}

async function regen(){
  if(!_uc)return;
  await _sb.from('daily_content').delete().eq('user_id',_u.id).eq('challenge_id',_uc.challenge_id).eq('day_number',_uc.current_day);
  document.getElementById('ai-zone').innerHTML='<div style="display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;background:#FFFAEC;border-radius:10px;font-size:.8rem;color:#666"><div class="spin"></div>Nouvelle génération&#8230;</div>';
  genContent(_uc, chById(_uc.challenge_id));
}

run();
</script>
