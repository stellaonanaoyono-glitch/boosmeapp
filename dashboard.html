<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon espace &#8212; BOOST.ME</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:68px}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;gap:1rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0}
.nav-r{display:flex;align-items:center;gap:.6rem}
.nav-nm{font-size:.8rem;font-weight:600;color:#333}
.nav-pl{background:#FFF8E1;color:#E5AC00;font-size:.62rem;font-weight:800;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem Poppins,sans-serif;cursor:pointer;color:#666;text-decoration:none;display:inline-flex;align-items:center}
.btn-sm:hover{border-color:#111;color:#111}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E2E2;display:grid;grid-template-columns:repeat(5,1fr);height:58px;z-index:100}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:Poppins,sans-serif;cursor:pointer;transition:color .15s}
.bn.on,.bn:hover{color:#FFC107}.bni{font-size:1.1rem;line-height:1}
.pg{margin-top:60px;padding:1.5rem 1.25rem;max-width:860px;margin-left:auto;margin-right:auto}
.by{display:inline-flex;align-items:center;justify-content:center;padding:.78rem 1.4rem;background:#FFC107;color:#111;font:700 .86rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;text-decoration:none}
.by:hover{background:#E5AC00}.by:disabled{background:#ccc;color:#888;cursor:not-allowed}
.bg{display:inline-flex;align-items:center;padding:.65rem 1.1rem;background:none;color:#666;font:600 .8rem Poppins,sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;text-decoration:none}
.bg:hover{border-color:#111;color:#111}
.card{background:#fff;border-radius:14px;padding:1.25rem;border:1px solid #E2E2E2;margin-bottom:1rem}
.sec-h{font-size:.9rem;font-weight:800;margin-bottom:.9rem}
.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.dgreet h1{font-size:1.5rem;font-weight:900;margin-bottom:.15rem}
.dgreet h1 em{color:#FFC107;font-style:normal}
.dt{font-size:.78rem;color:#999;margin-bottom:1.5rem}
.dash-ch{background:linear-gradient(135deg,#111,#1c1c1c);border-radius:16px;padding:1.4rem;margin-bottom:1.25rem;border:1px solid #333;position:relative;overflow:hidden}
.dash-ch::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,193,7,.08),transparent 65%);pointer-events:none}
.dch-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,193,7,.65);margin-bottom:.5rem}
.dch-title{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.dch-sub{font-size:.77rem;color:rgba(255,255,255,.42);margin-bottom:1rem}
.prog-bg{background:rgba(255,255,255,.1);border-radius:50px;height:5px;overflow:hidden;margin-bottom:.4rem}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#FFC107,#E5AC00);transition:width .5s}
.prog-meta{display:flex;justify-content:space-between;font-size:.7rem;color:rgba(255,255,255,.35)}
</style>
</head>

async function genContent(uc, ch){
  var ex=await _sb.from('daily_content').select('*').eq('user_id',_u.id).eq('challenge_id',uc.challenge_id).eq('day_number',uc.current_day).maybeSingle();
  if(ex.data){renderAI(ex.data);return;}
  
  var prompt='Coach expert. Jour '+uc.current_day+'/'+ch.dur+' du challenge "'+ch.name+'" ('+ch.cat+'). Utilisateur: '+(_p.prenom||'')+('. Objectif: '+ch.tag)+'. JSON UNIQUEMENT sans markdown: {"lesson_title":"...","lesson_body":"3 phrases max","action_title":"...","action_body":"2 phrases action concrète","question":"question réflexion du soir"}';
  
  try{
    var resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:450,temperature:0.8})
    });
    var d=await resp.json();
    if(!d.choices||!d.choices[0])throw new Error('no response');
    var raw=d.choices[0].message.content.trim();
    var m=raw.match(/\{[\s\S]*?\}/);
    if(!m)throw new Error('no json');
    var c=JSON.parse(m[0]);
    await _sb.from('daily_content').upsert({user_id:_u.id,challenge_id:uc.challenge_id,day_number:uc.current_day,lesson_title:c.lesson_title,lesson_body:c.lesson_body,action_title:c.action_title,action_body:c.action_body,question:c.question});
    renderAI(c);
  }catch(e){
    document.getElementById('ai-zone').innerHTML='<div style="padding:.9rem 1rem;background:#FEF3C7;border-radius:10px;font-size:.8rem;color:#666">Contenu temporairement indisponible. <button onclick="genContent(_uc,chById(_uc.challenge_id))" style="background:none;border:none;color:#E5AC00;font-weight:700;cursor:pointer;font-family:inherit">Réessayer</button></div>';
  }
}

    '<h3 style="font-size:.88rem;font-weight:700;margin-bottom:.35rem;line-height:1.35">'+c.action_title+'</h3>'+
    '<p style="font-size:.8rem;color:#555;line-height:1.6">'+c.action_body+'</p></div>'+
    '<div style="background:#fff;border-radius:12px;padding:1.1rem;border:1px solid #E2E2E2">'+
    '<div style="font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#6366F1;margin-bottom:.55rem">Question du soir</div>'+
    '<p style="font-size:.88rem;color:#333;font-style:italic;line-height:1.6">'+c.question+'</p>'+
    '<button class="bg" onclick="regen()" style="margin-top:.85rem;font-size:.75rem">&#8635; Régénérer</button></div>';
}

async function regen(){
  if(!_uc)return;
  await _sb.from('daily_content').delete().eq('user_id',_u.id).eq('challenge_id',_uc.challenge_id).eq('day_number',_uc.current_day);
  document.getElementById('ai-zone').innerHTML='<div style="display:flex;align-items:center;gap:.6rem;padding:.9rem 1rem;background:#FFFAEC;border-radius:10px;font-size:.8rem;color:#666"><div class="spin"></div>Nouvelle génération&#8230;</div>';
  genContent(_uc, chById(_uc.challenge_id));
}

run();
</script>
