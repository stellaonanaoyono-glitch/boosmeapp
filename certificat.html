<style>

*{margin:0;padding:0;box-sizing:border-box}

@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}

 ["Strat\u00e9gie r\u00e9seau", "Communication authentique", "Cr\u00e9ation de valeur relationnelle", "Suivi et r\u00e9ciprocit\u00e9", "D\u00e9veloppement professionnel"], "read-and-lead": ["Lecture strat\u00e9gique", "R\u00e9tention et m\u00e9morisation", "Application des connaissances", "Habitude intellectuelle", "Avantage comp\u00e9titif par la connaissance"]};

async function run(){
  var r=await _sb.auth.getSession();
  if(!r.data.session){window.location.href='/login';return;}
  var u=r.data.session.user;
  var params=new URLSearchParams(window.location.search);
  var chId=params.get('ch');
  var q=_sb.from('certificats').select('*').eq('user_id',u.id);
  if(chId)q=q.eq('challenge_id',chId);
  else q=q.order('completed_at',{ascending:false}).limit(1);
  var cr=await q.maybeSingle();
  if(!cr.data){
    document.getElementById('mz').innerHTML='<p style="color:#999;font-size:.84rem;padding:2rem">Aucun certificat trouv\u00e9. Termine un challenge pour obtenir le tien.</p>';
    return;
  }
  var pr=await _sb.from('profiles').select('prenom,nom,email').eq('id',u.id).single();
  var p=pr.data||{};
  renderCert(cr.data,p,u.email);
}

function renderCert(cert,p,email){
  var fn=((p.prenom||'')+(p.nom?' '+p.nom:'')).trim();if(!fn){fn=p.prenom||p.nom||'';}if(!fn){fn='Membre BOOST.ME';}
  var dt=new Date(cert.completed_at);
  var ds=dt.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  var chId=cert.challenge_id||'';
  var skills=CH_SKILLS[chId]||['D\u00e9veloppement personnel','Discipline','R\u00e9silience'];
  var tl=CERT_TAGLINES[chId]||'';
  var sh=skills.map(function(s){return '<span class="cert-skill">'+s+'</span>';}).join('');
  var cn=cert.cert_number||('BM-'+dt.getFullYear()+'-???');
  window._cd={fn:fn,ch:cert.challenge_name,dt:ds,em:email};
  document.getElementById('mz').innerHTML=
    '<div class="actions">'+
    '<button class="btn-act ba-y" onclick="dlPNG()">&#128247; Image PNG</button>'+
    '<button class="btn-act ba-d" onclick="dlPDF()">&#128196; PDF</button>'+
    '<button class="btn-act ba-w" onclick="sWA()">&#128172; WhatsApp</button>'+
    '<button class="btn-act ba-m" onclick="sMail()">&#9993; E-mail</button>'+
    '</div>'+
    '<div id="cert-wrap">'+
    '<div class="cert-gold"></div>'+
    '<div class="cert-top">'+
    '<div class="cert-hrow"><div class="cert-logo">BOOST.ME</div><div class="cert-badge">&#127942; Certificat de compl\u00e9tion</div></div>'+
    '<div class="cert-declares">Certifie que</div>'+
    '<div class="cert-fullname">'+fn+'</div>'+
    '<div class="cert-completed-txt">a compl\u00e9t\u00e9 avec succ\u00e8s les '+cert.days_completed+' jours du challenge</div>'+
    '<div class="cert-chname">'+cert.challenge_name+'</div>'+
    '<div class="cert-tagline">&ldquo;'+tl+'&rdquo;</div>'+
    '</div>'+
    '<div class="cert-bottom">'+
    '<div class="cert-skills-lbl">Aptitudes d\u00e9velopp\u00e9es</div>'+
    '<div class="cert-skills">'+sh+'</div>'+
    '<div class="cert-divider"></div>'+
    '<div class="cert-footer">'+
    '<div class="cert-sig-block"><div style="font-size:1.4rem;font-weight:900;color:#FFC107;letter-spacing:2px;font-family:Poppins,sans-serif;margin-bottom:.3rem">BOOST.ME</div><div style="font-size:.65rem;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase">Plateforme certifiée</div><div style="margin-top:.45rem;width:80px;height:2px;background:linear-gradient(90deg,#FFC107,#E5AC00);border-radius:1px"></div></div>'+
    '<div class="cert-seal"><span class="cert-seal-ico">&#11088;</span><div class="cert-seal-txt">BOOST.ME<br>CERTIFIED</div></div>'+
    '<div class="cert-meta"><div class="cert-num">'+cn+'</div><div class="cert-date-lbl">\u00c9mis le</div><div class="cert-date-val">'+ds+'</div></div>'+
    '</div></div>'+
    '<div class="cert-gold"></div>'+
    '</div>';
}

async function dlPNG(){
  toast('G\u00e9n\u00e9ration de l\'image\u2026');
  try{
    var el=document.getElementById('cert-wrap');
    var cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    var a=document.createElement('a');
    a.download='certificat-boostme-'+(window._cd.ch||'challenge').replace(/\s+/g,'-').toLowerCase()+'.png';
    a.href=cv.toDataURL('image/png');a.click();
    toast('\u2705 Image t\u00e9l\u00e9charg\u00e9e !');
  }catch(e){toast('Erreur: '+e.message);}
}

async function dlPDF(){
  toast('G\u00e9n\u00e9ration du PDF\u2026');
  try{
    var el=document.getElementById('cert-wrap');
    var cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    var img=cv.toDataURL('image/jpeg',0.95);
    var J=window.jspdf?window.jspdf.jsPDF:jsPDF;
    var doc=new J({orientation:'landscape',unit:'mm',format:'a4'});
    var pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
    var ratio=cv.width/cv.height,w=pw,h=pw/ratio;
    if(h>ph){h=ph;w=ph*ratio;}
    doc.addImage(img,'JPEG',(pw-w)/2,(ph-h)/2,w,h);
    doc.save('certificat-boostme-'+(window._cd.ch||'challenge').replace(/\s+/g,'-').toLowerCase()+'.pdf');
    toast('\u2705 PDF t\u00e9l\u00e9charg\u00e9 !');
  }catch(e){toast('Erreur PDF: '+e.message);}
}

function sWA(){
  var d=window._cd||{};
  var m=encodeURIComponent('J\u2019ai obtenu mon certificat BOOST.ME \u2014 '+d.ch+' \ud83c\udfc6\n'+d.fn+' \u00b7 '+d.dt+'\n\nRejoins-moi sur https://boostme.social');
  window.open('https://wa.me/?text='+m,'_blank');
}

function sMail(){
  var d=window._cd||{};
  var s=encodeURIComponent('Mon certificat BOOST.ME \u2014 '+d.ch);
  var b=encodeURIComponent('Bonjour,\n\nJe viens d\'obtenir mon certificat BOOST.ME pour le challenge "'+d.ch+'".\n\nD\u00e9livr\u00e9 le '+d.dt+' \u00e0 '+d.fn+'.\n\nD\u00e9couvre BOOST.ME : https://boostme.social\n\n');
  window.location.href='mailto:?subject='+s+'&body='+b;
}

run();
