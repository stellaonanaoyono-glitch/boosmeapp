<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon Certificat &mdash; BOOST.ME</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:2rem}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain}
.btn-sm{padding:.4rem .85rem;background:none;border:1.5px solid #E2E2E2;border-radius:8px;font:600 .74rem 'Poppins',sans-serif;cursor:pointer;color:#666;text-decoration:none;display:inline-flex;align-items:center}
.pg{margin-top:72px;padding:1.5rem 1.25rem;max-width:900px;margin-left:auto;margin-right:auto}
.loading{display:flex;align-items:center;gap:.6rem;padding:2rem;color:#999;font-size:.84rem}
.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.actions{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:1.5rem}
.btn-act{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.1rem;border-radius:10px;font:700 .8rem 'Poppins',sans-serif;cursor:pointer;border:none;transition:all .2s;text-decoration:none;white-space:nowrap}
.ba-y{background:#FFC107;color:#111}.ba-y:hover{background:#E5AC00}
.ba-d{background:#111;color:#fff}.ba-d:hover{background:#222}
.ba-w{background:#25D366;color:#fff}.ba-w:hover{background:#20c05c}
.ba-m{background:#4F46E5;color:#fff}.ba-m:hover{background:#4338ca}
#cert-wrap{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);max-width:800px;margin:0 auto 1.5rem}
.cert-gold{height:4px;background:linear-gradient(90deg,#FFC107,#E5AC00,#FFC107)}
.cert-top{background:linear-gradient(135deg,#0A0A0A 0%,#1A1A1A 50%,#0F0F0F 100%);padding:2.5rem;position:relative;overflow:hidden}
.cert-top::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,193,7,.1),transparent 60%);pointer-events:none}
.cert-hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;position:relative;z-index:1}
.cert-logo{font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:900;color:#FFC107;letter-spacing:1px}
.cert-badge{display:inline-flex;align-items:center;background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3);color:#FFC107;font-size:.65rem;font-weight:700;padding:.25rem .75rem;border-radius:50px;letter-spacing:.5px;text-transform:uppercase}
.cert-declares{font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:.5rem;position:relative;z-index:1}
.cert-fullname{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:#fff;line-height:1.1;margin-bottom:.5rem;position:relative;z-index:1}
.cert-completed-txt{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:1.4rem;position:relative;z-index:1}
.cert-chname{font-size:1.4rem;font-weight:800;color:#FFC107;margin-bottom:.3rem;position:relative;z-index:1}
.cert-tagline{font-size:.82rem;color:rgba(255,255,255,.42);font-style:italic;position:relative;z-index:1}
.cert-bottom{padding:2rem 2.5rem}
.cert-skills-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#bbb;margin-bottom:.75rem}
.cert-skills{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem}
.cert-skill{background:#F8F8F8;border:1px solid #E2E2E2;border-radius:50px;padding:.28rem .8rem;font-size:.7rem;font-weight:700;color:#333}
.cert-divider{height:1px;background:#F0F0F0;margin-bottom:1.5rem}
.cert-footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem}
.cert-sig-block{text-align:center}
.cert-sig{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:#111;font-weight:600;margin-bottom:.15rem}
.cert-sig-name{font-size:.7rem;font-weight:700;color:#555}
.cert-sig-role{font-size:.6rem;color:#bbb}
.cert-seal{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,#FFC107,#E5AC00);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,193,7,.3)}
.cert-seal-ico{font-size:1.1rem;display:block;line-height:1}
.cert-seal-txt{font-size:.42rem;font-weight:900;color:#111;text-align:center;line-height:1.4;text-transform:uppercase;letter-spacing:.6px;margin-top:.15rem}
.cert-meta{text-align:right}
.cert-num{font-size:.68rem;font-weight:700;color:#666;font-family:monospace;letter-spacing:.8px;margin-bottom:.25rem}
.cert-date-lbl{font-size:.6rem;color:#bbb}
.cert-date-val{font-size:.74rem;font-weight:700;color:#333}
@media(max-width:600px){
  .cert-top{padding:1.75rem 1.25rem}
  .cert-fullname{font-size:1.9rem}
  .cert-chname{font-size:1.1rem}
  .cert-bottom{padding:1.25rem}
  .cert-footer{grid-template-columns:1fr;gap:.75rem;text-align:center}
  .cert-meta{text-align:center}
  .cert-seal{margin:0 auto}
  .actions{gap:.4rem}
  .btn-act{font-size:.74rem;padding:.55rem .85rem}
}

</style>

async function dlPNG(){
  toast('G\u00e9n\u00e9ration de l\'image\u2026');
  try{
    var el=document.getElementById('cert-wrap');
    var cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    var a=document.createElement('a');
    a.download='certificat-boostme-'+(window._cd.ch||'challenge').replace(/\s+/g,'-').toLowerCase()+'.png';
    a.href=cv.toDataURL('image/png');a.click();
    toast('\u2705 Image t\u00e9l\u00e9charg\u00e9e !');
  }catch(e){toast('Erreur: '+e.message);}
}

async function dlPDF(){
  toast('G\u00e9n\u00e9ration du PDF\u2026');
  try{
    var el=document.getElementById('cert-wrap');
    var cv=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    var img=cv.toDataURL('image/jpeg',0.95);
    var J=window.jspdf?window.jspdf.jsPDF:jsPDF;
    var doc=new J({orientation:'landscape',unit:'mm',format:'a4'});
    var pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
    var ratio=cv.width/cv.height,w=pw,h=pw/ratio;
    if(h>ph){h=ph;w=ph*ratio;}
    doc.addImage(img,'JPEG',(pw-w)/2,(ph-h)/2,w,h);
    doc.save('certificat-boostme-'+(window._cd.ch||'challenge').replace(/\s+/g,'-').toLowerCase()+'.pdf');
    toast('\u2705 PDF t\u00e9l\u00e9charg\u00e9 !');
  }catch(e){toast('Erreur PDF: '+e.message);}
}

  var d=window._cd||{};

  window.open('https://wa.me/?text='+m,'_blank');
}

function sMail(){

  window.location.href='mailto:?subject='+s+'&body='+b;
}
