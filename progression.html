async function run(){
  var u=await initUser();if(!u)return;
  var v=await _sb.from('daily_validations').select('id',{count:'exact',head:true}).eq('user_id',u.id);
  document.getElementById('s-d').textContent=v.count||0;
  var uc=await _sb.from('user_challenges').select('streak,status').eq('user_id',u.id);
  var ms=0,done=0;
  if(uc.data){uc.data.forEach(function(x){if((x.streak||0)>ms)ms=x.streak||0;if(x.status==='completed')done++;});}
  document.getElementById('s-s').textContent=ms;
  document.getElementById('s-c').textContent=done;
  var r=await _sb.from('daily_validations').select('*').eq('user_id',u.id).order('validated_at',{ascending:false}).limit(30);
  if(!r.data||!r.data.length){
    document.getElementById('hist').innerHTML='<div style="background:#fff;border-radius:12px;padding:2rem;text-align:center;border:1px solid #E2E2E2;color:#999;font-size:.84rem">Aucune validation encore.<br><br><a class="by" href="/challenges" style="font-size:.8rem">Commencer un challenge</a></div>';
    return;
  }
  var html='';
  r.data.forEach(function(v){

    var ch=ALL_CH.find(function(x){return x.id===v.challenge_id;});
    html+='<div class="hi"><div><div class="hi-t">'+(ch?ch.ico+' '+ch.name:v.challenge_id)+' &mdash; Jour '+v.day_number+'</div>'+

      '<span class="vbdg">&#10003; Valid\u00e9</span></div>';
  });
  document.getElementById('hist').innerHTML=html;
}
