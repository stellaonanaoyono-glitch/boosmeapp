<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Se connecter — BOOST.ME</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:2rem}
.logo img{height:40px}
h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.35rem}
.sub{font-size:.85rem;color:#666;text-align:center;margin-bottom:2rem}
label{display:block;font-size:.75rem;font-weight:700;color:#444;margin-bottom:.35rem}
input{width:100%;padding:.75rem 1rem;border:1.5px solid #E2E2E2;border-radius:10px;font:500 .9rem/1 'Poppins',sans-serif;outline:none;margin-bottom:1rem;transition:border-color .15s}
input:focus{border-color:#FFC107}
.btn{width:100%;padding:.9rem;background:#FFC107;color:#111;font:700 .95rem/1 'Poppins',sans-serif;border:none;border-radius:10px;cursor:pointer;margin-top:.5rem;transition:all .2s}
.btn:hover{background:#E5AC00;transform:translateY(-1px)}
.btn:disabled{background:#E2E2E2;color:#999;transform:none;cursor:not-allowed}
.forgot{text-align:center;margin-top:1rem;font-size:.8rem;color:#999}
.forgot a{color:#FFC107;font-weight:600;cursor:pointer;text-decoration:none}
.sep{text-align:center;color:#ccc;font-size:.8rem;margin:1.25rem 0;position:relative}
.sep::before,.sep::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#E2E2E2}
.sep::before{left:0}.sep::after{right:0}
.link{text-align:center;font-size:.82rem;color:#666;margin-top:1.25rem}
.link a{color:#FFC107;font-weight:700;text-decoration:none}
.err{background:#FEE2E2;color:#991B1B;padding:.75rem 1rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#111;color:#fff;padding:.65rem 1.1rem;border-radius:10px;font-size:.78rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>

  <h1>Bon retour !</h1>
  <p class="sub">Connecte-toi pour reprendre ta transformation.</p>
  <div class="err" id="err"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="marie@email.com" autocomplete="email">
  <label>Mot de passe</label>
  <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
  <button class="btn" id="btn" onclick="doLogin()">Se connecter</button>
  <div class="forgot"><a onclick="doForgot()">Mot de passe oubli&#233; ?</a></div>
  <div class="sep">ou</div>
  <div class="link">Pas encore de compte ? <a href="/signup">Cr&#233;er un compte</a></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb = window.supabase.createClient('https://hddxbjmdtbxvxwmmdxmj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ');

// If already logged in → dashboard
sb.auth.getSession().then(function(r){
  if(r.data.session) window.location.href='/dashboard';
});

var _t;
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_t);_t=setTimeout(function(){e.classList.remove('show')},3000);}

function showErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}
function hideErr(){document.getElementById('err').style.display='none';}

async function doLogin(){
  hideErr();
  var email=document.getElementById('email').value.trim();
  var pwd=document.getElementById('pwd').value;
  var btn=document.getElementById('btn');
  if(!email||!pwd){showErr('Remplis ton email et ton mot de passe.');return;}
  btn.textContent='Connexion...';btn.disabled=true;
  var r=await sb.auth.signInWithPassword({email:email,password:pwd});
  if(r.error){
    btn.textContent='Se connecter';btn.disabled=false;
    if(r.error.message.includes('Invalid'))showErr('Email ou mot de passe incorrect.');
    else if(r.error.message.includes('confirmed'))showErr('V\u00e9rifie ta bo\u00eete email pour confirmer ton compte.');
    else showErr(r.error.message);
    return;
  }
  window.location.href='/dashboard';
}

async function doForgot(){
  var email=document.getElementById('email').value.trim();
  if(!email){showErr('Entre ton email d\'abord.');return;}
  var r=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://boostme.social/reset-password'});
  if(r.error){showErr(r.error.message);return;}
  toast('Email envoy\u00e9 ! V\u00e9rifie ta bo\u00eete mail.');
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
