<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#F2F2F2;color:#111;-webkit-font-smoothing:antialiased;padding-bottom:0}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #E2E2E2;height:60px;display:flex;align-items:center;padding:0 1.25rem;gap:1rem;justify-content:space-between}
.nav-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0}

.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:.58rem;font-weight:600;color:#999;text-decoration:none;border:none;background:none;font-family:Poppins,sans-serif;cursor:pointer;transition:color .15s}
.bn.on,.bn:hover{color:#FFC107}.bni{font-size:1.1rem;line-height:1}
.pg{margin-top:60px;padding:1.5rem 1.25rem;max-width:860px;margin-left:auto;margin-right:auto}

.by:hover{background:#E5AC00}.by:disabled{background:#ccc;color:#888;cursor:not-allowed}
.bg{display:inline-flex;align-items:center;padding:.65rem 1.1rem;background:none;color:#666;font:600 .8rem Poppins,sans-serif;border:1.5px solid #E2E2E2;border-radius:10px;cursor:pointer;text-decoration:none}

.spin{width:18px;height:18px;border:2.5px solid #E2E2E2;border-top-color:#FFC107;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:4.5rem;right:1rem;background:#111;color:#fff;padding:.62rem 1rem;border-radius:10px;font-size:.74rem;font-weight:600;border-left:3px solid #FFC107;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
body{background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.bx{background:#fff;border-radius:20px;padding:2.25rem;width:100%;max-width:400px}
.lg{text-align:center;margin-bottom:1.5rem}.lg img{height:36px;width:auto;object-fit:contain}
h1{font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.2rem}
.sub{font-size:.82rem;color:#666;text-align:center;margin-bottom:1.5rem}
label{display:block;font-size:.72rem;font-weight:700;color:#444;margin-bottom:.3rem;margin-top:.75rem}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:.72rem .95rem;border:1.5px solid #ddd;border-radius:10px;font:500 .88rem Poppins,sans-serif;outline:none;background:#F8F8F8;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus{border-color:#FFC107;background:#fff}
.btn{width:100%;padding:.88rem;background:#FFC107;color:#111;font:700 .92rem Poppins,sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn:hover{background:#E5AC00}.btn:disabled{background:#ccc;cursor:not-allowed}
.msg{padding:.72rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:.9rem;display:none}
.msg.err{background:#FEE2E2;color:#991B1B;display:block}
.msg.ok{background:#D1FAE5;color:#065F46;display:block}
.lnk{text-align:center;font-size:.78rem;color:#999;margin-top:1rem}
.lnk a{color:#E5AC00;font-weight:700;text-decoration:none}
.steps{display:flex;gap:.4rem;margin-bottom:1.5rem}
.st{flex:1;height:3px;border-radius:50px;background:#E2E2E2;transition:background .3s}
.st.on{background:#FFC107}
.panel{display:none}.panel.on{display:block}
.plans{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.9rem}
.pl{display:flex;align-items:center;gap:.8rem;background:#F8F8F8;border:1.5px solid #E2E2E2;border-radius:12px;padding:.82rem .95rem;cursor:pointer;transition:all .15s}
.pl:hover{border-color:#E5AC00}.pl.on{border-color:#FFC107;background:#FFFAEC}
.pl-r{width:16px;height:16px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;transition:all .15s;position:relative}
.pl.on .pl-r{background:#FFC107;border-color:#FFC107}
.pl.on .pl-r::after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:#111;top:50%;left:50%;transform:translate(-50%,-50%)}
.pl-in{flex:1}.pl-nm{font-size:.82rem;font-weight:700}.pl-ds{font-size:.68rem;color:#666}
.pl-px{font-size:.9rem;font-weight:800;white-space:nowrap}
.suc-wrap{text-align:center;padding:1.5rem 0}
.suc-ico{font-size:2.8rem;display:block;margin-bottom:.75rem}
.suc-h{font-size:1.25rem;font-weight:800;margin-bottom:.4rem}
.suc-p{font-size:.82rem;color:#666;line-height:1.65;margin-bottom:1.5rem}

<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div class="bx"><div class="lg"><a href="/" style="text-decoration:none;display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;background:#111;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#FFC107;font-weight:900;font-size:11px;font-family:Poppins,sans-serif;letter-spacing:-0.5px">BM</span></div><span style="font:900 15px/1 Poppins,sans-serif;color:#111;letter-spacing:0.5px">BOOST<span style="color:#FFC107">.ME</span></span></a></div><h1>Bon retour !</h1><p class="sub">Connecte-toi pour reprendre ta transformation.</p><div id="err" class="msg"></div><label>Email</label><input type="email" id="em" placeholder="marie@email.com" autocomplete="email"><label>Mot de passe</label><input type="password" id="pw" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password"><div style="text-align:right;margin-top:.3rem;margin-bottom:.6rem"><a href="#" onclick="forgot();return false;" style="font-size:.74rem;color:#999;text-decoration:none">Mot de passe oublié&nbsp;?</a></div><button class="btn" id="btn" onclick="login()">Se connecter</button><div class="lnk">Pas de compte ? <a href="/signup">Créer un compte gratuit</a></div></div>
<script>
var sb2=window.supabase.createClient("https://hddxbjmdtbxvxwmmdxmj.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkZHhiam1kdGJ4dnh3bW1keG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzI5NjksImV4cCI6MjA5NTgwODk2OX0.CmiVvDxN1qorQ8MPo5D70zA2uRoUWEofAPqMsXpr4oQ");
sb2.auth.getSession().then(function(r){if(r.data.session)window.location.href="/dashboard";});
function showErr(m){var e=document.getElementById("err");e.textContent=m;e.className="msg err";}
async function login(){
  var em=document.getElementById("em").value.trim();
  var pw=document.getElementById("pw").value;
  var btn=document.getElementById("btn");
  document.getElementById("err").className="msg";
  if(!em||!pw){showErr("Remplis les deux champs.");return;}
  btn.textContent="Connexion...";btn.disabled=true;
  var r=await sb2.auth.signInWithPassword({email:em,password:pw});
  if(r.error){
    btn.textContent="Se connecter";btn.disabled=false;
    if(r.error.message.includes("Invalid"))showErr("Email ou mot de passe incorrect.");
    else if(r.error.message.includes("confirm"))showErr("V\u00e9rifie ton email pour confirmer ton compte.");
    else showErr(r.error.message);
    return;
  }
  window.location.href="/dashboard";
}
async function forgot(){
  var em=document.getElementById("em").value.trim();
  if(!em){showErr("Entre ton email d'abord.");return;}
  await sb2.auth.resetPasswordForEmail(em,{redirectTo:"https://boostme.social/reset-password"});
  var e=document.getElementById("err");e.textContent="Email envoy\u00e9 ! V\u00e9rifie ta bo\u00eete mail.";e.className="msg ok";
}
document.addEventListener("keydown",function(e){if(e.key==="Enter")login();});
</script>
